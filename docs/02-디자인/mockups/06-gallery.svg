<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#C9A88C" flood-opacity="0.35"/>
    </filter>
    <filter id="shCard" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#C9A88C" flood-opacity="0.28"/>
    </filter>
    <g id="face2">
      <circle cx="-9" cy="-5" r="3.2" fill="#3B3A4E"/>
      <circle cx="9" cy="-5" r="3.2" fill="#3B3A4E"/>
      <path d="M -11 6 Q 0 16 11 6" fill="none" stroke="#3B3A4E" stroke-width="2.6" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="1180" height="820" fill="url(#bg)"/>
  <!-- decorative blobs (BubbleBackground) -->
  <circle cx="70" cy="150" r="120" fill="#8A6CFF" opacity="0.10"/>
  <circle cx="1120" cy="120" r="140" fill="#36C5C0" opacity="0.10"/>
  <circle cx="120" cy="720" r="90" fill="#5FD08A" opacity="0.11"/>
  <circle cx="1080" cy="760" r="80" fill="#FFC740" opacity="0.10"/>

  <!-- ===== top bar ===== -->
  <!-- back button -->
  <g filter="url(#shCard)">
    <circle cx="74" cy="74" r="30" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/>
    <path d="M 84 60 L 66 74 L 84 88" fill="none" stroke="#3B3A4E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- title -->
  <text x="590" y="66" font-size="40" font-weight="800" fill="#3B3A4E" text-anchor="middle">무엇을 색칠해볼까요?</text>
  <text x="590" y="102" font-size="20" fill="#9A8F86" text-anchor="middle">주언이의 색칠 도안 · 8개</text>
  <!-- current profile chip (top-right) -->
  <g>
    <text x="1048" y="82" font-size="24" font-weight="700" fill="#3B3A4E" text-anchor="end">주언이</text>
    <circle cx="1090" cy="74" r="28" fill="#FFE4DB" stroke="#FF7A59" stroke-width="5" filter="url(#shCard)"/>
    <use href="#face2" transform="translate(1090,74)"/>
  </g>

  <!-- ===== grid (4 cols x 2 rows) ===== -->
  <!-- col x: 80 350 620 890 ; row y: 175 435 ; card 210x210 rx28 -->

  <!-- card 1: flower (colored / 진행 중) -->
  <g filter="url(#shCard)"><rect x="80" y="175" width="210" height="210" rx="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <g transform="translate(185,258)">
    <circle cx="0" cy="-34" r="20" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="5"/>
    <circle cx="32" cy="-10" r="20" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="5"/>
    <circle cx="20" cy="28" r="20" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="5"/>
    <circle cx="-20" cy="28" r="20" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="5"/>
    <circle cx="-32" cy="-10" r="20" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="5"/>
    <circle cx="0" cy="-3" r="16" fill="#FFC740" stroke="#3B3A4E" stroke-width="5"/>
  </g>
  <rect x="92" y="187" width="78" height="30" rx="15" fill="#FF7A59"/>
  <text x="131" y="208" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
  <text x="185" y="360" font-size="18" font-weight="700" fill="#3B3A4E" text-anchor="middle">꽃밭</text>

  <!-- card 2: house (blank) -->
  <g filter="url(#shCard)"><rect x="350" y="175" width="210" height="210" rx="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <g transform="translate(455,255)" fill="none" stroke="#3B3A4E" stroke-width="5" stroke-linejoin="round">
    <rect x="-40" y="-6" width="80" height="64" rx="6"/>
    <path d="M -52 -6 L 0 -46 L 52 -6"/>
    <rect x="-14" y="22" width="28" height="36" rx="4"/>
  </g>
  <text x="455" y="360" font-size="18" font-weight="700" fill="#9A8F86" text-anchor="middle">우리 집</text>

  <!-- card 3: fish (colored / 진행 중) -->
  <g filter="url(#shCard)"><rect x="620" y="175" width="210" height="210" rx="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <g transform="translate(725,258)">
    <ellipse cx="-6" cy="0" rx="46" ry="30" fill="#CFF0EE" stroke="#3B3A4E" stroke-width="5"/>
    <path d="M 36 0 L 64 -22 L 64 22 Z" fill="#CFF0EE" stroke="#3B3A4E" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="-26" cy="-6" r="5" fill="#3B3A4E"/>
  </g>
  <rect x="632" y="187" width="78" height="30" rx="15" fill="#FF7A59"/>
  <text x="671" y="208" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
  <text x="725" y="360" font-size="18" font-weight="700" fill="#3B3A4E" text-anchor="middle">물고기</text>

  <!-- card 4: star (blank) -->
  <g filter="url(#shCard)"><rect x="890" y="175" width="210" height="210" rx="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <path d="M 0 -42 L 10 -14 L 40 -13 L 16 5 L 25 34 L 0 17 L -25 34 L -16 5 L -40 -13 L -10 -14 Z"
        transform="translate(995,258)" fill="none" stroke="#3B3A4E" stroke-width="5" stroke-linejoin="round"/>
  <text x="995" y="360" font-size="18" font-weight="700" fill="#9A8F86" text-anchor="middle">반짝 별</text>

  <!-- card 5: butterfly (colored / 진행 중) -->
  <g filter="url(#shCard)"><rect x="80" y="435" width="210" height="210" rx="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <g transform="translate(185,518)">
    <ellipse cx="-22" cy="-16" rx="22" ry="18" fill="#E6DEFF" stroke="#3B3A4E" stroke-width="5"/>
    <ellipse cx="22" cy="-16" rx="22" ry="18" fill="#E6DEFF" stroke="#3B3A4E" stroke-width="5"/>
    <ellipse cx="-20" cy="20" rx="18" ry="16" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="5"/>
    <ellipse cx="20" cy="20" rx="18" ry="16" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="5"/>
    <rect x="-4" y="-26" width="8" height="52" rx="4" fill="#3B3A4E"/>
  </g>
  <rect x="92" y="447" width="78" height="30" rx="15" fill="#FF7A59"/>
  <text x="131" y="468" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
  <text x="185" y="620" font-size="18" font-weight="700" fill="#3B3A4E" text-anchor="middle">나비</text>

  <!-- card 6: car (blank) -->
  <g filter="url(#shCard)"><rect x="350" y="435" width="210" height="210" rx="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <g transform="translate(455,515)" fill="none" stroke="#3B3A4E" stroke-width="5" stroke-linejoin="round">
    <path d="M -54 14 L -54 0 Q -54 -6 -48 -8 L -30 -14 Q -22 -30 -8 -30 L 24 -30 Q 38 -30 46 -10 L 52 -8 Q 56 -6 56 2 L 56 14"/>
    <path d="M -54 14 L 56 14"/>
    <circle cx="-30" cy="16" r="13" fill="#FFFFFF"/>
    <circle cx="34" cy="16" r="13" fill="#FFFFFF"/>
  </g>
  <text x="455" y="620" font-size="18" font-weight="700" fill="#9A8F86" text-anchor="middle">자동차</text>

  <!-- card 7: sun (blank) -->
  <g filter="url(#shCard)"><rect x="620" y="435" width="210" height="210" rx="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <g transform="translate(725,515)" fill="none" stroke="#3B3A4E" stroke-width="5" stroke-linecap="round">
    <circle cx="0" cy="0" r="26"/>
    <path d="M 0 -46 L 0 -36 M 0 36 L 0 46 M -46 0 L -36 0 M 36 0 L 46 0 M -33 -33 L -26 -26 M 33 33 L 26 26 M 33 -33 L 26 -26 M -33 33 L -26 26"/>
  </g>
  <text x="725" y="620" font-size="18" font-weight="700" fill="#9A8F86" text-anchor="middle">해님</text>

  <!-- card 8: balloon (colored / 진행 중) -->
  <g filter="url(#shCard)"><rect x="890" y="435" width="210" height="210" rx="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <g transform="translate(995,512)">
    <ellipse cx="0" cy="-6" rx="30" ry="36" fill="#FFCFc4" stroke="#3B3A4E" stroke-width="5"/>
    <path d="M 0 30 L 0 52" stroke="#3B3A4E" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M -5 30 L 5 30 L 0 38 Z" fill="#3B3A4E"/>
  </g>
  <rect x="902" y="447" width="78" height="30" rx="15" fill="#FF7A59"/>
  <text x="941" y="468" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
  <text x="995" y="620" font-size="18" font-weight="700" fill="#3B3A4E" text-anchor="middle">풍선</text>

  <!-- ===== add button (bottom-right corner) ===== -->
  <g filter="url(#sh)">
    <circle cx="1085" cy="710" r="48" fill="#FF7A59"/>
    <path d="M 1085 688 L 1085 732 M 1063 710 L 1107 710" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="1085" y="780" font-size="18" font-weight="600" fill="#7A6E64" text-anchor="middle">도안 추가</text>
</svg>
