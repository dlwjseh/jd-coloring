<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="980" viewBox="0 0 1460 980" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#C9A88C" flood-opacity="0.35"/>
    </filter>
    <filter id="shCard" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#C9A88C" flood-opacity="0.28"/>
    </filter>
    <filter id="shLift" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#C9A88C" flood-opacity="0.45"/>
    </filter>
    <g id="face">
      <circle cx="-6" cy="-4" r="2.4" fill="#3B3A4E"/>
      <circle cx="6" cy="-4" r="2.4" fill="#3B3A4E"/>
      <path d="M -8 4 Q 0 11 8 4" fill="none" stroke="#3B3A4E" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- ===== reusable illustrations (centered ~origin, scaled small) ===== -->
    <g id="ill-flower">
      <circle cx="0" cy="-22" r="13" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="3.4"/>
      <circle cx="21" cy="-7" r="13" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="3.4"/>
      <circle cx="13" cy="18" r="13" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="3.4"/>
      <circle cx="-13" cy="18" r="13" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="3.4"/>
      <circle cx="-21" cy="-7" r="13" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="3.4"/>
      <circle cx="0" cy="-2" r="10.5" fill="#FFC740" stroke="#3B3A4E" stroke-width="3.4"/>
    </g>
    <g id="ill-house" fill="none" stroke="#3B3A4E" stroke-width="3.4" stroke-linejoin="round">
      <rect x="-26" y="-4" width="52" height="42" rx="4"/>
      <path d="M -34 -4 L 0 -30 L 34 -4"/>
      <rect x="-9" y="15" width="18" height="23" rx="3"/>
    </g>
    <g id="ill-fish">
      <ellipse cx="-4" cy="0" rx="30" ry="20" fill="#CFF0EE" stroke="#3B3A4E" stroke-width="3.4"/>
      <path d="M 24 0 L 42 -14 L 42 14 Z" fill="#CFF0EE" stroke="#3B3A4E" stroke-width="3.4" stroke-linejoin="round"/>
      <circle cx="-17" cy="-4" r="3.4" fill="#3B3A4E"/>
    </g>
    <g id="ill-star">
      <path d="M 0 -30 L 7 -10 L 28 -9 L 11 4 L 18 24 L 0 12 L -18 24 L -11 4 L -28 -9 L -7 -10 Z"
            fill="none" stroke="#3B3A4E" stroke-width="3.4" stroke-linejoin="round"/>
    </g>
    <g id="ill-butterfly">
      <ellipse cx="-15" cy="-11" rx="15" ry="12" fill="#E6DEFF" stroke="#3B3A4E" stroke-width="3.4"/>
      <ellipse cx="15" cy="-11" rx="15" ry="12" fill="#E6DEFF" stroke="#3B3A4E" stroke-width="3.4"/>
      <ellipse cx="-14" cy="14" rx="12" ry="11" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="3.4"/>
      <ellipse cx="14" cy="14" rx="12" ry="11" fill="#FFD7E9" stroke="#3B3A4E" stroke-width="3.4"/>
      <rect x="-3" y="-18" width="6" height="36" rx="3" fill="#3B3A4E"/>
    </g>
    <g id="ill-car" fill="none" stroke="#3B3A4E" stroke-width="3.4" stroke-linejoin="round">
      <path d="M -36 9 L -36 0 Q -36 -4 -32 -5 L -20 -9 Q -15 -20 -5 -20 L 16 -20 Q 25 -20 30 -7 L 34 -5 Q 37 -4 37 1 L 37 9"/>
      <path d="M -36 9 L 37 9"/>
      <circle cx="-20" cy="11" r="9" fill="#FFFFFF"/>
      <circle cx="22" cy="11" r="9" fill="#FFFFFF"/>
    </g>
  </defs>

  <rect width="1460" height="980" fill="#FFFDFB"/>

  <!-- page header -->
  <text x="40" y="44" font-size="24" font-weight="800" fill="#3B3A4E">화면 2 — 도안 정렬 (수동 재배치)</text>
  <text x="40" y="72" font-size="15" fill="#9A8F86">상단 '정렬' 버튼으로 편집 모드 진입 → 카드를 끌어 재배치 → '완료'로 종료. 순서는 기기 전체 공용·앨범별 독립. (기획 §도안 정렬 / 2026-06-09)</text>

  <!-- ============================================================ -->
  <!-- FRAME A — 평상시 (normal) -->
  <!-- ============================================================ -->
  <g transform="translate(20,104)">
    <rect width="690" height="788" rx="30" fill="url(#bg)" stroke="#EBDFD2" stroke-width="1.5"/>
    <!-- decorative blobs -->
    <circle cx="56" cy="120" r="78" fill="#8A6CFF" opacity="0.08"/>
    <circle cx="650" cy="90" r="86" fill="#36C5C0" opacity="0.08"/>
    <circle cx="70" cy="700" r="60" fill="#5FD08A" opacity="0.09"/>

    <!-- top bar -->
    <!-- back -->
    <g filter="url(#shCard)">
      <circle cx="52" cy="54" r="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/>
      <path d="M 59 43 L 46 54 L 59 65" fill="none" stroke="#3B3A4E" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- '정렬' button (outline pill) -->
    <g filter="url(#shCard)">
      <rect x="92" y="34" width="116" height="40" rx="20" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/>
    </g>
    <!-- reorder icon: two stacked rows w/ up-down arrows -->
    <g stroke="#FF7A59" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M 112 47 L 122 47 M 112 61 L 122 61"/>
      <path d="M 130 44 L 130 64 M 126 48 L 130 44 L 134 48 M 126 60 L 130 64 L 134 60"/>
    </g>
    <text x="150" y="60" font-size="19" font-weight="700" fill="#3B3A4E">정렬</text>

    <!-- title -->
    <text x="345" y="46" font-size="26" font-weight="800" fill="#3B3A4E" text-anchor="middle">무엇을 색칠해볼까요?</text>
    <text x="345" y="70" font-size="14" fill="#9A8F86" text-anchor="middle">주언이의 색칠 도안 · 6개</text>
    <!-- profile chip -->
    <text x="600" y="60" font-size="16" font-weight="700" fill="#3B3A4E" text-anchor="end">주언이</text>
    <circle cx="630" cy="54" r="20" fill="#FFE4DB" stroke="#FF7A59" stroke-width="3.5" filter="url(#shCard)"/>
    <use href="#face" transform="translate(630,54)"/>

    <!-- grid 3x2, card 148 rx22, centers cols 167/345/523, rows 230/430 -->
    <!-- row1 -->
    <g transform="translate(167,230)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-flower" transform="translate(0,-8)"/>
      <rect x="-66" y="-66" width="58" height="24" rx="12" fill="#FF7A59"/>
      <text x="-37" y="-49" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#3B3A4E" text-anchor="middle">꽃밭</text>
    </g>
    <g transform="translate(345,230)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-house" transform="translate(0,-6)"/>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#9A8F86" text-anchor="middle">우리 집</text>
    </g>
    <g transform="translate(523,230)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-fish" transform="translate(0,-6)"/>
      <rect x="-66" y="-66" width="58" height="24" rx="12" fill="#FF7A59"/>
      <text x="-37" y="-49" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#3B3A4E" text-anchor="middle">물고기</text>
    </g>
    <!-- row2 -->
    <g transform="translate(167,430)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-star" transform="translate(0,-6)"/>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#9A8F86" text-anchor="middle">반짝 별</text>
    </g>
    <g transform="translate(345,430)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-butterfly" transform="translate(0,-6)"/>
      <rect x="-66" y="-66" width="58" height="24" rx="12" fill="#FF7A59"/>
      <text x="-37" y="-49" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#3B3A4E" text-anchor="middle">나비</text>
    </g>
    <g transform="translate(523,430)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-car" transform="translate(0,-6)"/>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#9A8F86" text-anchor="middle">자동차</text>
    </g>

    <!-- add button (visible in normal mode) -->
    <g filter="url(#sh)">
      <circle cx="624" cy="690" r="40" fill="#FF7A59"/>
      <path d="M 624 672 L 624 708 M 606 690 L 642 690" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="624" y="748" font-size="15" font-weight="600" fill="#7A6E64" text-anchor="middle">도안 추가</text>

    <!-- frame label -->
    <rect x="30" y="32" width="44" height="0" fill="none"/>
  </g>
  <text x="365" y="930" font-size="17" font-weight="800" fill="#3B3A4E" text-anchor="middle">A. 평상시</text>
  <text x="365" y="956" font-size="14" fill="#9A8F86" text-anchor="middle">좌상단 '정렬' 아웃라인 버튼 (도안 2개 이상일 때만 노출)</text>

  <!-- ============================================================ -->
  <!-- FRAME B — 정렬 모드 (reorder) -->
  <!-- ============================================================ -->
  <g transform="translate(750,104)">
    <rect width="690" height="788" rx="30" fill="url(#bg)" stroke="#EBDFD2" stroke-width="1.5"/>
    <circle cx="56" cy="120" r="78" fill="#8A6CFF" opacity="0.08"/>
    <circle cx="650" cy="90" r="86" fill="#36C5C0" opacity="0.08"/>
    <circle cx="70" cy="700" r="60" fill="#5FD08A" opacity="0.09"/>

    <!-- top bar -->
    <g filter="url(#shCard)">
      <circle cx="52" cy="54" r="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2" opacity="0.5"/>
      <path d="M 59 43 L 46 54 L 59 65" fill="none" stroke="#3B3A4E" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    </g>
    <!-- '완료' button (coral filled pill) -->
    <g filter="url(#shCard)">
      <rect x="92" y="34" width="104" height="40" rx="20" fill="#FF7A59"/>
    </g>
    <text x="144" y="60" font-size="19" font-weight="800" fill="#FFFFFF" text-anchor="middle">완료</text>

    <!-- title (dim hint in edit mode) -->
    <text x="345" y="46" font-size="26" font-weight="800" fill="#3B3A4E" text-anchor="middle">끌어서 순서 바꾸기</text>
    <text x="345" y="70" font-size="14" fill="#9A8F86" text-anchor="middle">원하는 자리로 카드를 옮겨요</text>
    <text x="600" y="60" font-size="16" font-weight="700" fill="#3B3A4E" text-anchor="end" opacity="0.5">주언이</text>
    <circle cx="630" cy="54" r="20" fill="#FFE4DB" stroke="#FF7A59" stroke-width="3.5" opacity="0.5"/>
    <use href="#face" transform="translate(630,54)" opacity="0.5"/>

    <!-- grid in reorder mode: cards jiggle (small rotation). One card lifted mid-drag, leaving a dashed drop-slot. -->
    <!-- Scenario: '나비'(was r2c2) is being dragged up toward r1c2; cards reflow. -->

    <!-- row1 -->
    <!-- r1c1 flower (jiggle) -->
    <g transform="translate(167,230) rotate(-2.2)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-flower" transform="translate(0,-8)"/>
      <rect x="-66" y="-66" width="58" height="24" rx="12" fill="#FF7A59"/>
      <text x="-37" y="-49" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#3B3A4E" text-anchor="middle">꽃밭</text>
    </g>
    <!-- r1c2 dashed DROP SLOT (where the dragged card will land) -->
    <g transform="translate(345,230)">
      <rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FF7A59" fill-opacity="0.06"
            stroke="#FF7A59" stroke-width="2.5" stroke-dasharray="8 7"/>
      <text x="0" y="6" font-size="13" font-weight="700" fill="#FF9A82" text-anchor="middle">여기로</text>
    </g>
    <!-- r1c3 fish (jiggle) -->
    <g transform="translate(523,230) rotate(2)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-fish" transform="translate(0,-6)"/>
      <rect x="-66" y="-66" width="58" height="24" rx="12" fill="#FF7A59"/>
      <text x="-37" y="-49" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#3B3A4E" text-anchor="middle">물고기</text>
    </g>

    <!-- row2 (house shifted into old butterfly-ish flow; show 3: house, star, car jiggling) -->
    <g transform="translate(167,430) rotate(1.8)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-house" transform="translate(0,-6)"/>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#9A8F86" text-anchor="middle">우리 집</text>
    </g>
    <g transform="translate(345,430) rotate(-1.8)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-star" transform="translate(0,-6)"/>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#9A8F86" text-anchor="middle">반짝 별</text>
    </g>
    <g transform="translate(523,430) rotate(2.2)">
      <g filter="url(#shCard)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
      <use href="#ill-car" transform="translate(0,-6)"/>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#9A8F86" text-anchor="middle">자동차</text>
    </g>

    <!-- LIFTED card being dragged ('나비') — bigger, strong shadow, slight tilt, near finger -->
    <g transform="translate(300,320) rotate(-5) scale(1.08)">
      <g filter="url(#shLift)"><rect x="-74" y="-74" width="148" height="148" rx="22" fill="#FFFFFF" stroke="#FF7A59" stroke-width="3"/></g>
      <use href="#ill-butterfly" transform="translate(0,-6)"/>
      <rect x="-66" y="-66" width="58" height="24" rx="12" fill="#FF7A59"/>
      <text x="-37" y="-49" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">진행 중</text>
      <text x="0" y="58" font-size="15" font-weight="700" fill="#3B3A4E" text-anchor="middle">나비</text>
    </g>
    <!-- finger/touch indicator -->
    <circle cx="318" cy="338" r="26" fill="#3B3A4E" opacity="0.10"/>
    <circle cx="318" cy="338" r="13" fill="#3B3A4E" opacity="0.16"/>

    <!-- add button HIDDEN in reorder mode → ghost outline note -->
    <g opacity="0.32">
      <circle cx="624" cy="690" r="40" fill="none" stroke="#C9B7A8" stroke-width="2.5" stroke-dasharray="6 6"/>
      <path d="M 624 672 L 624 708 M 606 690 L 642 690" stroke="#C9B7A8" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="624" y="748" font-size="13" font-weight="600" fill="#B6A89B" text-anchor="middle">추가 버튼 숨김</text>
  </g>
  <text x="1095" y="930" font-size="17" font-weight="800" fill="#3B3A4E" text-anchor="middle">B. 정렬 모드</text>
  <text x="1095" y="956" font-size="14" fill="#9A8F86" text-anchor="middle">카드 지글(±2°) + 끌기. 점선 슬롯에 스냅 · 다른 카드 reflow · '완료'로 종료</text>
</svg>
