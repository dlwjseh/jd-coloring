<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="744" viewBox="0 0 1180 744" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#C9A88C" flood-opacity="0.35"/>
    </filter>
    <filter id="sh3" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#9A8270" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1180" height="744" fill="#FFFDFB"/>

  <!-- ===================== Frame A : 레일 아래 휴지통 버튼 ===================== -->
  <text x="300" y="50" font-size="22" font-weight="700" fill="#3B3A4E" text-anchor="middle">① 우측 툴 레일 아래 — 원형 휴지통</text>
  <rect x="40" y="72" width="520" height="610" rx="32" fill="#FFF4EC"/>

  <!-- 좌측 미니 캔버스 (맥락용, 간략 꽃) -->
  <g filter="url(#sh3)"><rect x="62" y="96" width="356" height="562" rx="26" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <g transform="translate(240,330)">
    <circle cx="0" cy="-44" r="34" fill="#F7C8D8"/><circle cx="42" cy="-2" r="34" fill="#F7C8D8"/>
    <circle cx="-42" cy="-2" r="34" fill="#F7C8D8"/><circle cx="26" cy="44" r="34" fill="#F7C8D8"/>
    <circle cx="-26" cy="44" r="34" fill="#F7C8D8"/><circle cx="0" cy="0" r="26" fill="#FBD774"/>
    <rect x="-6" y="46" width="12" height="120" rx="6" fill="#9FD6AE"/>
    <g fill="none" stroke="#3B3A4E" stroke-width="5" stroke-linejoin="round">
      <circle cx="0" cy="-44" r="34"/><circle cx="42" cy="-2" r="34"/><circle cx="-42" cy="-2" r="34"/>
      <circle cx="26" cy="44" r="34"/><circle cx="-26" cy="44" r="34"/><circle cx="0" cy="0" r="26"/>
      <rect x="-6" y="46" width="12" height="120" rx="6"/>
    </g>
  </g>

  <!-- 우측 세로 툴 레일 (간략) : x460..540, 폭 80 -->
  <g filter="url(#sh)"><rect x="460" y="112" width="80" height="410" rx="40" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <!-- 현재 색 -->
  <circle cx="500" cy="150" r="19" fill="#F29CB4" stroke="#3B3A4E" stroke-width="3"/>
  <line x1="474" y1="184" x2="526" y2="184" stroke="#EBDFD2" stroke-width="2"/>
  <!-- 색 (2x2) -->
  <g>
    <rect x="489" y="202" width="11" height="11" rx="2.5" fill="#FF7A59"/><rect x="501" y="202" width="11" height="11" rx="2.5" fill="#FFC740"/>
    <rect x="489" y="214" width="11" height="11" rx="2.5" fill="#36C5C0"/><rect x="501" y="214" width="11" height="11" rx="2.5" fill="#8A6CFF"/>
  </g>
  <line x1="474" y1="246" x2="526" y2="246" stroke="#EBDFD2" stroke-width="2"/>
  <!-- 도구 (간략 2칸) -->
  <rect x="471" y="262" width="26" height="30" rx="8" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/>
  <rect x="503" y="262" width="26" height="30" rx="8" fill="#FFF1EC" stroke="#FF7A59" stroke-width="2.5"/>
  <line x1="474" y1="312" x2="526" y2="312" stroke="#EBDFD2" stroke-width="2"/>
  <!-- 굵기 (4단으로 갱신: r5/8/11/14, 선택 핑크링) -->
  <g fill="#3B3A4E">
    <circle cx="500" cy="338" r="5"/><circle cx="500" cy="364" r="8"/><circle cx="500" cy="394" r="11"/><circle cx="500" cy="430" r="14"/>
  </g>
  <circle cx="500" cy="364" r="16" fill="none" stroke="#FF6FAF" stroke-width="2.5"/>
  <line x1="474" y1="462" x2="526" y2="462" stroke="#EBDFD2" stroke-width="2"/>
  <!-- 지우개 -->
  <g transform="translate(500,494) rotate(-18)">
    <rect x="-19" y="-14" width="38" height="28" rx="6" fill="#FFFFFF" stroke="#3B3A4E" stroke-width="2.5"/>
    <path d="M -19 -8 a6 6 0 0 1 6 -6 h26 a6 6 0 0 1 6 6 v6 h-38 Z" fill="#FF9FB5" stroke="#3B3A4E" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- ★ 신규: 원형 휴지통 버튼 (레일 바로 아래, 지름 = 레일 폭 80 → x460..540) -->
  <!-- 폭 일치 가이드 (레일 좌/우 모서리 → 버튼 좌/우 모서리) -->
  <line x1="460" y1="522" x2="460" y2="624" stroke="#D9B89C" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="540" y1="522" x2="540" y2="624" stroke="#D9B89C" stroke-width="1.5" stroke-dasharray="4 5"/>
  <g filter="url(#sh)"><circle cx="500" cy="584" r="40" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <!-- trash 심볼 (차분한 회색, 위험색 아님) -->
  <g transform="translate(500,584)" fill="none" stroke="#6E6258" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-6" y="-18" width="12" height="5" rx="2"/>
    <line x1="-16" y1="-10.5" x2="16" y2="-10.5"/>
    <path d="M -12 -5 L 12 -5 L 9.5 23 L -9.5 23 Z"/>
    <line x1="-5" y1="2" x2="-6" y2="17"/>
    <line x1="0" y1="2" x2="0" y2="17"/>
    <line x1="5" y1="2" x2="6" y2="17"/>
  </g>
  <text x="500" y="648" font-size="14" font-weight="600" fill="#B6A89B" text-anchor="middle">초기화</text>

  <!-- 치수 콜아웃 -->
  <g>
    <line x1="436" y1="584" x2="448" y2="584" stroke="#C9A88C" stroke-width="1.5"/>
    <text x="372" y="572" font-size="14" font-weight="700" fill="#9A8270" text-anchor="middle">지름 =</text>
    <text x="372" y="590" font-size="14" font-weight="700" fill="#9A8270" text-anchor="middle">레일 폭</text>
    <text x="372" y="608" font-size="12" fill="#B6A89B" text-anchor="middle">(96pt)</text>
  </g>

  <!-- ===================== Frame B : 확인 다이얼로그 ===================== -->
  <text x="880" y="50" font-size="22" font-weight="700" fill="#3B3A4E" text-anchor="middle">② 탭 → 확인 다이얼로그</text>
  <rect x="620" y="72" width="520" height="610" rx="32" fill="#FFF4EC"/>
  <!-- 캔버스 위 딤 스크림 -->
  <rect x="620" y="72" width="520" height="610" rx="32" fill="#3B3A4E" opacity="0.42"/>

  <!-- 다이얼로그 카드 -->
  <g filter="url(#sh3)"><rect x="710" y="226" width="340" height="300" rx="28" fill="#FFFFFF"/></g>
  <!-- 상단 아이콘 배지 (옅은 빨강 틴트 + 빨강 trash) -->
  <circle cx="880" cy="294" r="34" fill="#FFE7E5"/>
  <g transform="translate(880,294) scale(0.78)" fill="none" stroke="#FF5A5F" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-6" y="-18" width="12" height="5" rx="2"/>
    <line x1="-16" y1="-10.5" x2="16" y2="-10.5"/>
    <path d="M -12 -5 L 12 -5 L 9.5 23 L -9.5 23 Z"/>
    <line x1="-5" y1="2" x2="-6" y2="17"/>
    <line x1="0" y1="2" x2="0" y2="17"/>
    <line x1="5" y1="2" x2="6" y2="17"/>
  </g>
  <!-- 제목 (○○ = 도안명) -->
  <text x="880" y="370" font-size="22" font-weight="800" fill="#3B3A4E" text-anchor="middle">‘도안 1’의 색칠을</text>
  <text x="880" y="400" font-size="22" font-weight="800" fill="#3B3A4E" text-anchor="middle">모두 지울까요?</text>
  <text x="880" y="430" font-size="16" fill="#9A8F86" text-anchor="middle">지운 색칠은 되돌릴 수 없어요</text>
  <!-- 버튼: [취소] / [초기화](destructive 빨강) -->
  <rect x="734" y="448" width="138" height="54" rx="16" fill="#FFFFFF" stroke="#C9BCAE" stroke-width="2"/>
  <text x="803" y="483" font-size="21" font-weight="700" fill="#7A6E64" text-anchor="middle">취소</text>
  <rect x="888" y="448" width="138" height="54" rx="16" fill="#FF5A5F"/>
  <text x="957" y="483" font-size="21" font-weight="700" fill="#FFFFFF" text-anchor="middle">초기화</text>

  <!-- 하단 동작 요약 -->
  <text x="590" y="718" font-size="15" fill="#9A8F86" text-anchor="middle">＊ [초기화] 확인 시 — 색칠 비움 + 작업물(Artwork) 삭제 → 갤러리에서 빈 도안으로 표시 · 선택 색·도구·굵기는 그대로 유지</text>
</svg>
