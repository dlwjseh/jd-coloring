  </g>
  <text x="590" y="48" font-size="34" font-weight="800" fill="#3B3A4E" text-anchor="middle">무엇을 색칠해볼까요?</text>
  <text x="590" y="78" font-size="19" fill="#9A8F86" text-anchor="middle">알파벳 · 52개 도안 · 대문자 26 · 소문자 26</text>
  <g>
