<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 860" width="1320" height="860" font-family="'SF Pro Rounded', 'SF Pro Display', -apple-system, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#3B3A4E" flood-opacity="0.13"/>
    </filter>
    <filter id="sh2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#3B3A4E" flood-opacity="0.18"/>
    </filter>
    <filter id="shSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3B3A4E" flood-opacity="0.10"/>
    </filter>
    <!-- Flower line art for card thumbnails -->
    <g id="flower">
      <!-- petals -->
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="none" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(-20 32 32)"/>
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="none" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(52 32 32)"/>
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="none" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(124 32 32)"/>
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="none" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(196 32 32)"/>
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="none" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(268 32 32)"/>
      <!-- center -->
      <circle cx="32" cy="32" r="8" fill="none" stroke="#3B3A4E" stroke-width="1.8"/>
    </g>
    <g id="flower-colored">
      <!-- petals colored -->
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="#FFD6E8" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(-20 32 32)"/>
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="#FFD6E8" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(52 32 32)"/>
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="#E8D5F5" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(124 32 32)"/>
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="#D5EBF5" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(196 32 32)"/>
      <ellipse cx="32" cy="14" rx="9" ry="14" fill="#D5F5E3" stroke="#3B3A4E" stroke-width="1.8" transform="rotate(268 32 32)"/>
      <circle cx="32" cy="32" r="8" fill="#FFF3D6" stroke="#3B3A4E" stroke-width="1.8"/>
    </g>
  </defs>

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
  </defs>
  <rect width="1320" height="860" fill="url(#bg)"/>
  <!-- Bubble decorations -->
  <circle cx="80" cy="120" r="44" fill="#FF7A59" opacity="0.07"/>
  <circle cx="1240" cy="200" r="60" fill="#8A6CFF" opacity="0.07"/>
  <circle cx="200" cy="780" r="38" fill="#36C5C0" opacity="0.07"/>
  <circle cx="1100" cy="750" r="52" fill="#FFC740" opacity="0.07"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FRAME A: Gallery Cards — 이름 있음 vs 없음 -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="60" y="52" font-size="22" font-weight="800" fill="#3B3A4E">A. 갤러리 카드 — 이름 있음 / 없음 비교</text>

  <!-- Grid context strip -->
  <rect x="40" y="68" width="600" height="340" rx="28" fill="#F8F4F0" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="340" y="96" font-size="13" fill="#9A8F86" text-anchor="middle">갤러리 그리드 (발췌)</text>

  <!-- Card 1: 이름 있음 + 진행 중 -->
  <g transform="translate(70,108)" filter="url(#sh)">
    <rect width="158" height="200" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
    <!-- thumbnail area -->
    <rect x="8" y="8" width="142" height="156" rx="16" fill="#FFF9F6"/>
    <!-- flower colored -->
    <g transform="translate(47,44) scale(2.0)">
      <use href="#flower-colored"/>
    </g>
    <!-- 진행 중 배지 -->
    <rect x="10" y="12" width="58" height="22" rx="11" fill="#FF7A59"/>
    <text x="39" y="27" font-size="11" font-weight="700" fill="white" text-anchor="middle">진행 중</text>
    <!-- 이름 라벨 영역 (30pt 고정) -->
    <rect x="0" y="170" width="158" height="30" rx="0" fill="none"/>
    <text x="79" y="189" font-size="13" font-weight="600" fill="#3B3A4E" text-anchor="middle">봄날의 꽃</text>
  </g>
  <!-- Label -->
  <text x="149" y="326" font-size="12" fill="#FF7A59" text-anchor="middle" font-weight="600">이름 있음 (진행 중)</text>

  <!-- Card 2: 이름 있음 + 미착수 -->
  <g transform="translate(248,108)" filter="url(#sh)">
    <rect width="158" height="200" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
    <rect x="8" y="8" width="142" height="156" rx="16" fill="#FAFAFA"/>
    <g transform="translate(47,44) scale(2.0)">
      <use href="#flower"/>
    </g>
    <!-- 이름 라벨 영역 -->
    <rect x="0" y="170" width="158" height="30" rx="0" fill="none"/>
    <text x="79" y="189" font-size="13" font-weight="600" fill="#9A8F86" text-anchor="middle">나비와 꽃밭</text>
  </g>
  <text x="327" y="326" font-size="12" fill="#9A8F86" text-anchor="middle" font-weight="600">이름 있음 (미착수)</text>

  <!-- Card 3: 이름 없음 -->
  <g transform="translate(426,108)" filter="url(#sh)">
    <rect width="158" height="200" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
    <rect x="8" y="8" width="142" height="156" rx="16" fill="#FAFAFA"/>
    <g transform="translate(47,44) scale(2.0)">
      <use href="#flower"/>
    </g>
    <!-- 이름 라벨 영역 비어있음 (30pt 유지) -->
    <rect x="0" y="170" width="158" height="30" rx="0" fill="none"/>
    <!-- 빈 공간 표시용 점선 (실제 앱엔 없음) -->
    <rect x="20" y="178" width="118" height="14" rx="7" fill="#F0EBE5" opacity="0.6"/>
    <text x="79" y="189" font-size="10" fill="#C4B8AF" text-anchor="middle" font-style="italic">이름 없음</text>
  </g>
  <text x="505" y="326" font-size="12" fill="#B6A89B" text-anchor="middle" font-weight="600">이름 없음 (30pt 영역 유지)</text>

  <!-- Height annotation -->
  <line x1="38" y1="108" x2="38" y2="308" stroke="#EBDFD2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="33" y1="108" x2="43" y2="108" stroke="#EBDFD2" stroke-width="1.5"/>
  <line x1="33" y1="308" x2="43" y2="308" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="22" y="215" font-size="11" fill="#9A8F86" text-anchor="middle" transform="rotate(-90 22 215)">200pt</text>

  <!-- Thumbnail / name area annotation -->
  <line x1="600" y1="108" x2="600" y2="278" stroke="#B6A89B" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="600" y1="278" x2="600" y2="308" stroke="#FF7A59" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="615" y="220" font-size="11" fill="#9A8F86">썸네일 170pt</text>
  <text x="615" y="298" font-size="11" fill="#FF7A59">이름 30pt 고정</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FRAME B: Upload sheet with name input -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="700" y="52" font-size="22" font-weight="800" fill="#3B3A4E">B. 업로드 시트 — 이름 입력 필드 추가</text>

  <!-- Backdrop -->
  <rect x="680" y="68" width="580" height="370" rx="0" fill="#3B3A4E" opacity="0.32"/>

  <!-- Sheet card -->
  <g filter="url(#sh)">
    <rect x="760" y="90" width="420" height="340" rx="32" fill="#FFFFFF"/>
  </g>

  <!-- Sheet title -->
  <text x="970" y="136" font-size="20" font-weight="800" fill="#3B3A4E" text-anchor="middle">도안 만들기</text>
  <text x="970" y="157" font-size="13" fill="#9A8F86" text-anchor="middle">사진을 골라 색칠 도안으로 추가해요</text>

  <!-- Image preview box -->
  <rect x="800" y="168" width="340" height="120" rx="18" fill="#F5F0EB" stroke="#EBDFD2" stroke-width="1.5"/>
  <!-- Preview image representation -->
  <g transform="translate(940,196) scale(1.4)">
    <use href="#flower-colored"/>
  </g>
  <!-- "사진 다시 선택" link -->
  <text x="970" y="302" font-size="13" fill="#FF7A59" text-anchor="middle" font-weight="600">사진 다시 선택</text>

  <!-- Name input field (NEW) -->
  <rect x="800" y="312" width="340" height="42" rx="14" fill="#FFFFFF" stroke="#FF7A59" stroke-width="2"/>
  <text x="820" y="337" font-size="14" fill="#3B3A4E">봄날의 꽃</text>
  <!-- cursor -->
  <line x1="890" y1="321" x2="890" y2="345" stroke="#FF7A59" stroke-width="2"/>
  <!-- field label -->
  <text x="1115" y="340" font-size="11" fill="#9A8F86" text-anchor="end" font-style="italic">선택 입력</text>
  <!-- NEW badge -->
  <rect x="800" y="298" width="32" height="14" rx="7" fill="#FF7A59"/>
  <text x="816" y="309" font-size="9" fill="white" text-anchor="middle" font-weight="700">NEW</text>

  <!-- Buttons -->
  <rect x="800" y="364" width="158" height="48" rx="16" fill="white" stroke="#C9BCAE" stroke-width="1.5"/>
  <text x="879" y="393" font-size="16" font-weight="600" fill="#7A6E64" text-anchor="middle">취소</text>
  <rect x="972" y="364" width="168" height="48" rx="16" fill="#FF7A59"/>
  <text x="1056" y="393" font-size="16" font-weight="700" fill="white" text-anchor="middle">도안 저장</text>

  <!-- Annotation: field is optional -->
  <line x1="1142" y1="333" x2="1175" y2="333" stroke="#9A8F86" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="1180" y="337" font-size="11" fill="#9A8F86">없으면 저장 가능</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FRAME C: Long-press context menu -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="60" y="466" font-size="22" font-weight="800" fill="#3B3A4E">C. 갤러리 롱프레스 메뉴 — [이름 수정] 추가</text>

  <!-- Gallery card (dimmed context) -->
  <g transform="translate(60,490)" filter="url(#sh)">
    <rect width="158" height="200" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5" opacity="0.7"/>
    <rect x="8" y="8" width="142" height="156" rx="16" fill="#FFF9F6" opacity="0.7"/>
    <g transform="translate(47,44) scale(2.0)" opacity="0.7">
      <use href="#flower-colored"/>
    </g>
    <rect x="10" y="12" width="58" height="22" rx="11" fill="#FF7A59" opacity="0.7"/>
    <text x="39" y="27" font-size="11" font-weight="700" fill="white" text-anchor="middle" opacity="0.7">진행 중</text>
    <text x="79" y="189" font-size="13" font-weight="600" fill="#3B3A4E" text-anchor="middle" opacity="0.7">봄날의 꽃</text>
  </g>
  <!-- scale-up highlight on card -->
  <rect x="56" y="486" width="166" height="208" rx="24" fill="none" stroke="#FF7A59" stroke-width="2.5" opacity="0.5"/>

  <!-- Context menu popover -->
  <g filter="url(#sh2)">
    <rect x="240" y="490" width="240" height="154" rx="22" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1"/>
  </g>

  <!-- Menu item 1: 이름 수정 (NEW) -->
  <rect x="240" y="490" width="240" height="50" rx="0" fill="none"/>
  <rect x="240" y="490" width="240" height="50" rx="22" fill="#FFF5F2"/>
  <!-- clip bottom corners -->
  <rect x="240" y="512" width="240" height="28" fill="#FFF5F2"/>
  <!-- pencil icon circle -->
  <circle cx="276" cy="516" r="16" fill="#FFE4DB"/>
  <text x="276" y="521" font-size="14" text-anchor="middle">✏️</text>
  <text x="366" y="521" font-size="16" font-weight="600" fill="#3B3A4E" text-anchor="middle">이름 수정</text>
  <!-- NEW badge -->
  <rect x="456" y="505" width="18" height="14" rx="7" fill="#FF7A59"/>
  <text x="465" y="516" font-size="8" fill="white" text-anchor="middle" font-weight="700">N</text>
  <!-- divider -->
  <line x1="258" y1="540" x2="462" y2="540" stroke="#EBDFD2" stroke-width="1"/>

  <!-- Menu item 2: 내 색칠 초기화 -->
  <rect x="240" y="540" width="240" height="50" fill="none"/>
  <circle cx="276" cy="566" r="16" fill="#F0EDFF"/>
  <text x="276" y="571" font-size="14" text-anchor="middle">🔄</text>
  <text x="366" y="571" font-size="16" font-weight="600" fill="#3B3A4E" text-anchor="middle">내 색칠 초기화</text>
  <!-- divider -->
  <line x1="258" y1="590" x2="462" y2="590" stroke="#EBDFD2" stroke-width="1"/>

  <!-- Menu item 3: 도안 삭제 (빨강) -->
  <rect x="240" y="590" width="240" height="54" rx="0" fill="none"/>
  <rect x="240" y="612" width="240" height="32" rx="22" fill="none"/>
  <!-- clip top corners -->
  <rect x="240" y="590" width="240" height="32" fill="#FFFFFF"/>
  <rect x="240" y="608" width="240" height="36" rx="22" fill="#FFFFFF"/>
  <circle cx="276" cy="617" r="16" fill="#FFE8E8"/>
  <text x="276" y="622" font-size="14" text-anchor="middle">🗑️</text>
  <text x="366" y="622" font-size="16" font-weight="600" fill="#FF5A5F" text-anchor="middle">도안 삭제</text>

  <!-- Arrow from card to menu -->
  <path d="M230,540 C235,540 238,540 240,540" stroke="#9A8F86" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FRAME D: Name edit sheet (from long-press) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="700" y="466" font-size="22" font-weight="800" fill="#3B3A4E">D. [이름 수정] 시트</text>

  <!-- Backdrop -->
  <rect x="680" y="490" width="580" height="250" rx="0" fill="#3B3A4E" opacity="0.28"/>

  <!-- Sheet card -->
  <g filter="url(#sh)">
    <rect x="760" y="510" width="420" height="220" rx="28" fill="#FFFFFF"/>
  </g>

  <text x="970" y="555" font-size="18" font-weight="800" fill="#3B3A4E" text-anchor="middle">이름 수정</text>
  <text x="970" y="575" font-size="13" fill="#9A8F86" text-anchor="middle">도안의 이름을 바꿔요</text>

  <!-- Name field (pre-filled) -->
  <rect x="800" y="588" width="340" height="46" rx="14" fill="#FFFFFF" stroke="#FF7A59" stroke-width="2"/>
  <text x="820" y="616" font-size="15" fill="#3B3A4E">봄날의 꽃</text>
  <line x1="884" y1="597" x2="884" y2="621" stroke="#FF7A59" stroke-width="2"/>

  <!-- char counter -->
  <text x="1132" y="616" font-size="11" fill="#9A8F86" text-anchor="end">6 / 30</text>

  <!-- Buttons -->
  <rect x="800" y="648" width="158" height="48" rx="16" fill="white" stroke="#C9BCAE" stroke-width="1.5"/>
  <text x="879" y="677" font-size="16" font-weight="600" fill="#7A6E64" text-anchor="middle">취소</text>
  <rect x="972" y="648" width="168" height="48" rx="16" fill="#FF7A59"/>
  <text x="1056" y="677" font-size="16" font-weight="700" fill="white" text-anchor="middle">저장</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FRAME E: Canvas top bar with name -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="60" y="730" font-size="22" font-weight="800" fill="#3B3A4E">E. 캔버스 상단 — 도안명 표시 (있을 때만)</text>

  <!-- Canvas top bar -->
  <rect x="60" y="752" width="580" height="72" rx="20" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5" filter="url(#shSoft)"/>

  <!-- Back button -->
  <circle cx="106" cy="788" r="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5" filter="url(#shSoft)"/>
  <text x="106" y="794" font-size="18" fill="#3B3A4E" text-anchor="middle">‹</text>

  <!-- 도안명 (있음) -->
  <text x="166" y="793" font-size="18" font-weight="700" fill="#3B3A4E">봄날의 꽃</text>
  <rect x="158" y="775" width="120" height="26" rx="6" fill="none" stroke="#FF7A59" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
  <text x="287" y="770" font-size="11" fill="#FF7A59">있을 때 표시</text>

  <!-- Timer chip -->
  <rect x="480" y="769" width="140" height="36" rx="18" fill="#EBF3FF"/>
  <text x="550" y="792" font-size="14" font-weight="700" fill="#2F6CB8" text-anchor="middle">⏱ 14분 32초</text>

  <!-- Canvas (no name version) -->
  <rect x="680" y="752" width="580" height="72" rx="20" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5" filter="url(#shSoft)"/>
  <circle cx="726" cy="788" r="28" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5" filter="url(#shSoft)"/>
  <text x="726" y="794" font-size="18" fill="#3B3A4E" text-anchor="middle">‹</text>
  <!-- 도안명 없음 → 빈 공간 -->
  <text x="786" y="793" font-size="14" fill="#C4B8AF" font-style="italic">← 이름 없으면 숨김 (공간 빈 채로)</text>

  <!-- Legend -->
  <text x="640" y="850" font-size="12" fill="#B6A89B" text-anchor="middle">목업 파일: docs/02-디자인/mockups/23-template-name.svg  ·  기획: requirements.md §도안 이름  ·  스펙: design-spec.md §24</text>
</svg>
