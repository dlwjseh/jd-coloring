<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
    <filter id="shCard" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#C9A88C" flood-opacity="0.28"/>
    </filter>
    <filter id="shSheet" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="26" flood-color="#4A3B2E" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1180" height="820" fill="url(#bg)"/>
  <!-- dimmed carousel behind -->
  <rect width="1180" height="820" fill="#3B3A4E" opacity="0.42"/>

  <!-- ===== create sheet ===== -->
  <g filter="url(#shSheet)"><rect x="280" y="120" width="620" height="650" rx="40" fill="#FFFFFF"/></g>

  <text x="590" y="198" font-size="34" font-weight="800" fill="#3B3A4E" text-anchor="middle">새 앨범 만들기</text>
  <text x="590" y="234" font-size="19" fill="#9A8F86" text-anchor="middle">이름을 정하고 대표 그림을 골라요</text>

  <!-- cover image picker (empty / dashed) -->
  <rect x="475" y="270" width="230" height="230" rx="32" fill="#FFF6F2" stroke="#FF7A59" stroke-width="3" stroke-dasharray="10 9"/>
  <g transform="translate(590,372)">
    <circle cx="0" cy="-14" r="30" fill="none" stroke="#FF7A59" stroke-width="5"/>
    <path d="M 0 -28 L 0 0 M -14 -14 L 14 -14" stroke="#FF7A59" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="44" font-size="19" font-weight="700" fill="#FF7A59" text-anchor="middle">대표 그림 선택</text>
    <text x="0" y="70" font-size="15" fill="#B6A89B" text-anchor="middle">(선택 · 사진에서)</text>
  </g>

  <!-- name field (required) -->
  <rect x="320" y="540" width="540" height="58" rx="16" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="344" y="577" font-size="20" fill="#B9ACA0">앨범 이름 (필수)</text>
  <text x="838" y="577" font-size="20" fill="#D8C9BA" text-anchor="end">✎</text>

  <!-- buttons -->
  <rect x="320" y="648" width="262" height="60" rx="16" fill="#FFFFFF" stroke="#C9BCAE" stroke-width="2"/>
  <text x="451" y="687" font-size="21" font-weight="600" fill="#7A6E64" text-anchor="middle">취소</text>
  <rect x="598" y="648" width="262" height="60" rx="16" fill="#FF7A59"/>
  <text x="729" y="687" font-size="21" font-weight="700" fill="#FFFFFF" text-anchor="middle">만들기</text>

  <!-- annotation -->
  <text x="590" y="752" font-size="15" fill="#FFFFFF" opacity="0.85" text-anchor="middle">그림을 고르면 점선 자리에 미리보기가 채워져요 · 수정도 같은 시트(값 채워진 채로) 재사용</text>
</svg>
