<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <defs>
    <filter id="sh3" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#9A8270" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1180" height="640" fill="#FFFDFB"/>

  <!-- ===== Frame A : long-press menu ===== -->
  <text x="300" y="56" font-size="22" font-weight="700" fill="#3B3A4E" text-anchor="middle">① 프로필을 길게 누르면</text>
  <rect x="40" y="80" width="520" height="520" rx="32" fill="#FFF4EC"/>
  <!-- dim overlay -->
  <rect x="40" y="80" width="520" height="520" rx="32" fill="#3B3A4E" opacity="0.28"/>
  <!-- three small profiles, middle lifted -->
  <circle cx="160" cy="300" r="52" fill="#FFE4DB" stroke="#FF7A59" stroke-width="6" opacity="0.5"/>
  <circle cx="440" cy="300" r="52" fill="#FFF1CC" stroke="#FFC740" stroke-width="6" opacity="0.5"/>
  <!-- lifted profile -->
  <g filter="url(#sh3)">
    <circle cx="300" cy="285" r="66" fill="#ECE6FF" stroke="#8A6CFF" stroke-width="8"/>
  </g>
  <circle cx="288" cy="276" r="6" fill="#3B3A4E"/><circle cx="312" cy="276" r="6" fill="#3B3A4E"/>
  <path d="M 282 298 Q 300 318 318 298" fill="none" stroke="#3B3A4E" stroke-width="6" stroke-linecap="round"/>
  <text x="300" y="385" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">서연</text>
  <!-- context menu popover -->
  <g filter="url(#sh3)">
    <rect x="222" y="410" width="156" height="116" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="252" y="452" font-size="22">✏️</text>
  <text x="290" y="452" font-size="21" font-weight="600" fill="#3B3A4E">수정</text>
  <line x1="240" y1="468" x2="360" y2="468" stroke="#F0E6DA" stroke-width="2"/>
  <text x="252" y="506" font-size="22">🗑️</text>
  <text x="290" y="506" font-size="21" font-weight="700" fill="#FF5A5F">삭제</text>

  <!-- ===== Frame B : delete confirm ===== -->
  <text x="880" y="56" font-size="22" font-weight="700" fill="#3B3A4E" text-anchor="middle">② [삭제] → 확인 다이얼로그</text>
  <rect x="620" y="80" width="520" height="520" rx="32" fill="#FFF4EC"/>
  <rect x="620" y="80" width="520" height="520" rx="32" fill="#3B3A4E" opacity="0.4"/>
  <!-- dialog card -->
  <g filter="url(#sh3)">
    <rect x="710" y="220" width="340" height="248" rx="28" fill="#FFFFFF"/>
  </g>
  <text x="880" y="278" font-size="34" text-anchor="middle">🗑️</text>
  <text x="880" y="322" font-size="23" font-weight="800" fill="#3B3A4E" text-anchor="middle">‘서연’ 프로필을 삭제할까요?</text>
  <text x="880" y="354" font-size="17" fill="#9A8F86" text-anchor="middle">이 작업은 되돌릴 수 없어요</text>
  <rect x="734" y="386" width="138" height="54" rx="16" fill="#FFFFFF" stroke="#C9BCAE" stroke-width="2"/>
  <text x="803" y="421" font-size="21" font-weight="700" fill="#7A6E64" text-anchor="middle">취소</text>
  <rect x="888" y="386" width="138" height="54" rx="16" fill="#FF5A5F"/>
  <text x="957" y="421" font-size="21" font-weight="700" fill="#FFFFFF" text-anchor="middle">삭제</text>

  <text x="590" y="630" font-size="16" fill="#B6A89B" text-anchor="middle">＊ Mac에서는 길게 누르기 대신 우클릭(컨트롤+클릭) 컨텍스트 메뉴로 동일 동작 제공</text>
</svg>
