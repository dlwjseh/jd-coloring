    <g transform="translate(300,0)"><rect width="130" height="130" rx="26" fill="#36C5C0"/><text x="65" y="170" font-size="18" font-weight="700" fill="#3B3A4E" text-anchor="middle">티일</text><text x="65" y="194" font-size="15" fill="#9A8F86" text-anchor="middle">#36C5C0</text></g>
    <g transform="translate(450,0)"><rect width="130" height="130" rx="26" fill="#FFC740"/><text x="65" y="170" font-size="18" font-weight="700" fill="#3B3A4E" text-anchor="middle">옐로</text><text x="65" y="194" font-size="15" fill="#9A8F86" text-anchor="middle">#FFC740</text></g>
