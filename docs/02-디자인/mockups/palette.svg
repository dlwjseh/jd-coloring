    <g transform="translate(750,0)"><rect width="130" height="130" rx="26" fill="#5FD08A"/><text x="65" y="170" font-size="18" font-weight="700" fill="#3B3A4E" text-anchor="middle">그린</text><text x="65" y="194" font-size="15" fill="#9A8F86" text-anchor="middle">#5FD08A</text></g>
