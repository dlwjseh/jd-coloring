<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#C9A88C" flood-opacity="0.30"/>
    </filter>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#3B3A4E" flood-opacity="0.10"/>
    </filter>
    <filter id="shg" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#3FA86B" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1180" height="760" fill="#FFFDFB"/>
  <circle cx="90" cy="690" r="100" fill="#5FD08A" opacity="0.06"/>
  <circle cx="1100" cy="80"  r="70"  fill="#36C5C0" opacity="0.05"/>

  <!-- Header -->
  <text x="40" y="34" font-size="19" font-weight="700" fill="#3B3A4E">페인트통(영역 채우기) + 채우기 Undo — 화면 3 캔버스</text>
  <text x="40" y="54" font-size="12" fill="#9A8F86">도구 묶음에 페인트통(3번째) 추가 · 탭 1회로 칸 전체 단색 채움 · 직전 채우기 1회 Undo(레일 하단, 상태 기반)</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LEFT: 레이아웃 맥락 — 페인트통 선택 + 한 칸 채워진 상태          -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="30" y="70" width="330" height="672" rx="22" fill="#FFF4EC" stroke="#EBDFD2" stroke-width="1"/>
  <text x="195" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="#9A8F86">레이아웃 맥락 (페인트통 활성)</text>

  <!-- Top bar (slim) -->
  <circle cx="62" cy="118" r="20" fill="white" stroke="#EBDFD2" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="62" y="125" text-anchor="middle" font-size="15" fill="#3B3A4E">‹</text>
  <text x="92" y="124" font-size="13" font-weight="700" fill="#3B3A4E">봄꽃 도안</text>

  <!-- Canvas -->
  <g filter="url(#sh)">
    <rect x="46" y="142" width="208" height="566" rx="20" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/>
  </g>
  <!-- Flower : 윗 꽃잎 1장 = 페인트통으로 단색(파랑) 꽉 채워짐, 나머지는 빈(흰) 칸 -->
  <g transform="translate(150,420)">
    <!-- filled petal (solid blue, paint-bucket result) -->
    <circle cx="0" cy="-30" r="23" fill="#5BA3E0"/>
    <!-- other regions empty (white) -->
    <circle cx="28" cy="-2" r="23" fill="#FFFFFF"/>
    <circle cx="-28" cy="-2" r="23" fill="#FFFFFF"/>
    <circle cx="17" cy="29" r="23" fill="#FFFFFF"/>
    <circle cx="-17" cy="29" r="23" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="17" fill="#FFFFFF"/>
    <!-- line-art overlay (always-on top, black) -->
    <g fill="none" stroke="#3B3A4E" stroke-width="3" stroke-linejoin="round">
      <circle cx="0" cy="-30" r="23"/><circle cx="28" cy="-2" r="23"/>
      <circle cx="-28" cy="-2" r="23"/><circle cx="17" cy="29" r="23"/>
      <circle cx="-17" cy="29" r="23"/><circle cx="0" cy="0" r="17"/>
    </g>
    <!-- tap indicator on the filled petal (설명용 오버레이 — 실제 UI 아님) -->
    <circle cx="0" cy="-30" r="30" fill="none" stroke="#5BA3E0" stroke-width="2" stroke-dasharray="3 4" opacity="0.8"/>
    <circle cx="0" cy="-30" r="4.5" fill="#3B3A4E" opacity="0.55"/>
  </g>
  <text x="150" y="650" text-anchor="middle" font-size="10.5" fill="#9A8F86">탭한 윗 꽃잎 = 단색 파랑으로 한 번에 채워짐</text>
  <text x="150" y="666" text-anchor="middle" font-size="10.5" fill="#C0AFA0">(점선·점 = 설명용 오버레이, 실제 UI 없음)</text>

  <!-- Right column (cx=300) -->
  <!-- guides (top, save) -->
  <line x1="280" y1="142" x2="280" y2="160" stroke="#D9B89C" stroke-width="1.2" stroke-dasharray="3 4"/>
  <line x1="320" y1="142" x2="320" y2="160" stroke="#D9B89C" stroke-width="1.2" stroke-dasharray="3 4"/>

  <!-- Save satellite (green, unchanged) -->
  <g filter="url(#shg)">
    <circle cx="300" cy="180" r="30" fill="#E6F7EE" stroke="#A8DFBF" stroke-width="2"/>
  </g>
  <polyline points="288,180 296,189 313,170" fill="none" stroke="#3FA86B" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- guides rail -->
  <line x1="280" y1="210" x2="280" y2="226" stroke="#D9B89C" stroke-width="1.2" stroke-dasharray="3 4"/>
  <line x1="320" y1="210" x2="320" y2="226" stroke="#D9B89C" stroke-width="1.2" stroke-dasharray="3 4"/>

  <!-- Tool rail -->
  <g filter="url(#sh)">
    <rect x="280" y="226" width="40" height="356" rx="20" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/>
  </g>
  <!-- 1) current color circle (= color picker) : 현재색 = 파랑 -->
  <circle cx="300" cy="250" r="11" fill="#5BA3E0" stroke="#3B3A4E" stroke-width="2"/>
  <line x1="286" y1="272" x2="314" y2="272" stroke="#EBDFD2" stroke-width="1.5"/>
  <!-- 2) tools : brush / pencil / PAINT BUCKET(active) -->
  <!-- brush (inactive, ink) -->
  <g transform="translate(300,288)">
    <line x1="-7" y1="6" x2="5" y2="-6" stroke="#3B3A4E" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M 4,-7 l 4,4 l -2,4 l -6,-2 Z" fill="#3B3A4E"/>
  </g>
  <!-- pencil (inactive, ink) -->
  <g transform="translate(300,314)">
    <line x1="-7" y1="6" x2="5" y2="-6" stroke="#3B3A4E" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M 5,-6 l 3,3 l -3,3 l -3,-3 Z" fill="#3B3A4E"/>
  </g>
  <!-- paint bucket (ACTIVE) : coral droplet + coral tint bg -->
  <rect x="284" y="328" width="32" height="28" rx="9" fill="#FFF1EC"/>
  <path d="M 300,332 C 305,339 309,343 309,347 a9,9 0 1 1 -18,0 C 291,343 295,339 300,332 Z" fill="#FF7A59"/>
  <line x1="286" y1="370" x2="314" y2="370" stroke="#EBDFD2" stroke-width="1.5"/>
  <!-- 3) thickness dots (dimmed: 페인트통 활성 중 미사용) -->
  <g opacity="0.4">
    <circle cx="300" cy="384" r="3" fill="#3B3A4E"/>
    <circle cx="300" cy="398" r="5" fill="#3B3A4E"/>
    <circle cx="300" cy="414" r="7" fill="#3B3A4E"/>
    <circle cx="300" cy="433" r="9" fill="#3B3A4E"/>
  </g>
  <line x1="286" y1="452" x2="314" y2="452" stroke="#EBDFD2" stroke-width="1.5"/>
  <!-- 4) eraser (inactive) -->
  <g transform="translate(300,472) rotate(-15)">
    <rect x="-12" y="-8" width="24" height="16" rx="4" fill="#FFFFFF" stroke="#3B3A4E" stroke-width="1.5"/>
    <path d="M -12,-3 a4,4 0 0 1 4,-5 h16 a4,4 0 0 1 4,5 v4 h-24 Z" fill="#FF9FB5" stroke="#3B3A4E" stroke-width="1.2" stroke-linejoin="round"/>
  </g>
  <line x1="286" y1="494" x2="314" y2="494" stroke="#EBDFD2" stroke-width="1.5"/>
  <!-- 5) UNDO (fill) — ENABLED here (방금 채웠으므로 활성) -->
  <g transform="translate(300,516)" fill="none" stroke="#6E6258" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -7,-1 A 8,8 0 1 1 -5,7"/>
    <polyline points="-11,-5 -7,-1 -3,-5"/>
  </g>

  <!-- guides reset -->
  <line x1="280" y1="582" x2="280" y2="600" stroke="#D9B89C" stroke-width="1.2" stroke-dasharray="3 4"/>
  <line x1="320" y1="582" x2="320" y2="600" stroke="#D9B89C" stroke-width="1.2" stroke-dasharray="3 4"/>

  <!-- Reset trash satellite (unchanged) -->
  <g filter="url(#sh)">
    <circle cx="300" cy="630" r="30" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/>
  </g>
  <g transform="translate(300,630)" fill="none" stroke="#6E6258" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-4" y="-13" width="8" height="3.6" rx="1.5"/>
    <line x1="-10" y1="-7" x2="10" y2="-7"/>
    <path d="M -7,-2.5 L 7,-2.5 L 5.8,12 L -5.8,12 Z"/>
    <line x1="-2.6" y1="1" x2="-3" y2="9"/>
    <line x1="0" y1="1" x2="0" y2="9"/>
    <line x1="2.6" y1="1" x2="3" y2="9"/>
  </g>

  <!-- rail callouts -->
  <text x="332" y="254" font-size="9.5" fill="#B6A89B">색</text>
  <text x="332" y="346" font-size="9.5" font-weight="700" fill="#FF7A59">페인트통</text>
  <text x="332" y="520" font-size="9.5" font-weight="700" fill="#6E6258">되돌리기</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- MIDDLE: 페인트통 도구 — 아이콘 상태 + 채움 동작                 -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="378" y="70" width="384" height="672" rx="20" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="398" y="98" font-size="14" font-weight="700" fill="#3B3A4E">① 페인트통 도구 (새 3번째 도구)</text>
  <text x="398" y="117" font-size="11" fill="#9A8F86">브러쉬 · 색연필 다음. 셋 중 하나만 활성(기존 전환 규칙)</text>

  <!-- Tool stack demo (브러쉬 / 색연필 / 페인트통) -->
  <text x="430" y="150" text-anchor="middle" font-size="10.5" font-weight="600" fill="#9A8F86">비활성</text>
  <text x="610" y="150" text-anchor="middle" font-size="10.5" font-weight="600" fill="#FF7A59">활성(코랄 틴트)</text>

  <!-- brush row -->
  <g transform="translate(430,182)">
    <g transform="scale(2)" fill="none">
      <line x1="-9" y1="8" x2="6" y2="-7" stroke="#3B3A4E" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M 5,-9 l 5,5 l -3,5 l -7,-3 Z" fill="#3B3A4E" stroke="none"/>
    </g>
  </g>
  <text x="470" y="188" font-size="12" fill="#3B3A4E">브러쉬  paintbrush.pointed</text>

  <!-- pencil row -->
  <g transform="translate(430,230)">
    <g transform="scale(2)">
      <line x1="-9" y1="8" x2="6" y2="-7" stroke="#3B3A4E" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M 6,-8 l 4,4 l -4,4 l -4,-4 Z" fill="#3B3A4E"/>
    </g>
  </g>
  <text x="470" y="236" font-size="12" fill="#3B3A4E">색연필  pencil</text>

  <!-- paint bucket row (active highlight) -->
  <rect x="404" y="258" width="52" height="48" rx="14" fill="#FFF1EC"/>
  <g transform="translate(430,282)">
    <path d="M 0,-12 C 8,-1 14,5 14,11 a14,14 0 1 1 -28,0 C -14,5 -8,-1 0,-12 Z" fill="#FF7A59"/>
    <ellipse cx="-4" cy="6" rx="3" ry="4.5" fill="#FFFFFF" opacity="0.45"/>
  </g>
  <text x="470" y="280" font-size="12" font-weight="700" fill="#FF7A59">페인트통  drop.fill</text>
  <text x="470" y="297" font-size="10.5" fill="#9A8F86">활성 = 코랄 아이콘 + 옅은 코랄 틴트</text>

  <text x="398" y="338" font-size="10.5" fill="#9A8F86">아이콘 후보: drop.fill(채움). 최종은 개발 재량 — 브러쉬/색연필과 혼동 없게.</text>

  <!-- Behavior: tap → solid fill -->
  <line x1="398" y1="356" x2="742" y2="356" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="398" y="380" font-size="13" font-weight="700" fill="#3B3A4E">② 동작 — 탭 1회 → 칸 전체 단색 채움</text>

  <!-- before -->
  <text x="468" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#9A8F86">탭 전 (빈 칸)</text>
  <g transform="translate(468,470)">
    <circle cx="0" cy="-26" r="20" fill="#FFFFFF"/>
    <circle cx="24" cy="-2" r="20" fill="#FFFFFF"/>
    <circle cx="-24" cy="-2" r="20" fill="#FFFFFF"/>
    <circle cx="15" cy="25" r="20" fill="#FFFFFF"/>
    <circle cx="-15" cy="25" r="20" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="15" fill="#FFFFFF"/>
    <g fill="none" stroke="#3B3A4E" stroke-width="2.6" stroke-linejoin="round">
      <circle cx="0" cy="-26" r="20"/><circle cx="24" cy="-2" r="20"/>
      <circle cx="-24" cy="-2" r="20"/><circle cx="15" cy="25" r="20"/>
      <circle cx="-15" cy="25" r="20"/><circle cx="0" cy="0" r="15"/>
    </g>
    <!-- finger tap on top petal -->
    <circle cx="0" cy="-26" r="5" fill="#3B3A4E" opacity="0.5"/>
    <circle cx="0" cy="-26" r="11" fill="none" stroke="#3B3A4E" stroke-width="1.6" stroke-dasharray="2 3" opacity="0.6"/>
  </g>

  <!-- arrow -->
  <g transform="translate(570,470)">
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#FF7A59" stroke-width="3" stroke-linecap="round"/>
    <polyline points="10,-7 19,0 10,7" fill="none" stroke="#FF7A59" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="-14" text-anchor="middle" font-size="10" fill="#FF7A59">탭</text>
  </g>

  <!-- after -->
  <text x="672" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#9A8F86">탭 후 (채워짐)</text>
  <g transform="translate(672,470)">
    <circle cx="0" cy="-26" r="20" fill="#5BA3E0"/>
    <circle cx="24" cy="-2" r="20" fill="#FFFFFF"/>
    <circle cx="-24" cy="-2" r="20" fill="#FFFFFF"/>
    <circle cx="15" cy="25" r="20" fill="#FFFFFF"/>
    <circle cx="-15" cy="25" r="20" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="15" fill="#FFFFFF"/>
    <g fill="none" stroke="#3B3A4E" stroke-width="2.6" stroke-linejoin="round">
      <circle cx="0" cy="-26" r="20"/><circle cx="24" cy="-2" r="20"/>
      <circle cx="-24" cy="-2" r="20"/><circle cx="15" cy="25" r="20"/>
      <circle cx="-15" cy="25" r="20"/><circle cx="0" cy="0" r="15"/>
    </g>
  </g>

  <text x="570" y="528" text-anchor="middle" font-size="10.5" fill="#9A8F86">단색 불투명(alpha 255) · 칸 경계(검은 선) 밖으로 안 샘</text>

  <!-- replace behavior -->
  <line x1="398" y1="548" x2="742" y2="548" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="398" y="572" font-size="13" font-weight="700" fill="#3B3A4E">③ 이미 칠해진 칸 재탭 = 새 색으로 교체</text>

  <!-- replace: blue petal -> pick yellow -> tap again -> yellow -->
  <g transform="translate(440,628)">
    <circle cx="0" cy="0" r="22" fill="#5BA3E0"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#3B3A4E" stroke-width="2.6"/>
  </g>
  <text x="440" y="668" text-anchor="middle" font-size="10" fill="#9A8F86">파랑으로 채운 칸</text>

  <g transform="translate(540,628)">
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#FF7A59" stroke-width="3" stroke-linecap="round"/>
    <polyline points="9,-6 17,0 9,6" fill="none" stroke="#FF7A59" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="-12" text-anchor="middle" font-size="9.5" fill="#FF7A59">노랑 골라</text>
    <text x="0" y="22" text-anchor="middle" font-size="9.5" fill="#FF7A59">다시 탭</text>
  </g>

  <g transform="translate(640,628)">
    <circle cx="0" cy="0" r="22" fill="#FBD774"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#3B3A4E" stroke-width="2.6"/>
  </g>
  <text x="640" y="668" text-anchor="middle" font-size="10" fill="#9A8F86">노랑으로 덮임</text>
  <text x="570" y="700" text-anchor="middle" font-size="10.5" fill="#9A8F86">기존 색·자국을 지우고 새 색으로 교체 → 색 실수 즉시 수정</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- RIGHT: 채우기 Undo — 위치 + 상태                               -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="778" y="70" width="372" height="672" rx="20" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="798" y="98" font-size="14" font-weight="700" fill="#3B3A4E">④ 채우기 Undo (직전 채우기 1회)</text>
  <text x="798" y="117" font-size="11" fill="#9A8F86">오탭으로 넓은 영역을 잘못 채웠을 때 바로 되돌리기</text>

  <!-- placement note -->
  <rect x="798" y="132" width="332" height="60" rx="12" fill="#FFF4EC" stroke="#EBDFD2" stroke-width="1"/>
  <text x="812" y="153" font-size="11.5" font-weight="700" fill="#3B3A4E">위치 = 레일 하단(지우개 아래, 구분선 1단)</text>
  <text x="812" y="171" font-size="10.5" fill="#9A8F86">96pt 위성 원 대신 레일 안 아이콘 → 세로 공간 절약 ·</text>
  <text x="812" y="185" font-size="10.5" fill="#9A8F86">비활성(기본 상태)이 큰 원으로 튀지 않음. 항상 표시, 상태 기반.</text>

  <!-- state demos -->
  <text x="888" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#3FA86B">활성 (직전 동작 = 채우기)</text>
  <text x="1040" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#B6A89B">비활성 (되돌릴 채우기 없음)</text>

  <!-- enabled -->
  <rect x="848" y="238" width="80" height="80" rx="18" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
  <g transform="translate(888,278)" fill="none" stroke="#6E6258" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -11,-2 A 13,13 0 1 1 -8,11"/>
    <polyline points="-17,-8 -11,-2 -5,-8"/>
  </g>
  <text x="888" y="336" text-anchor="middle" font-size="10" fill="#9A8F86">#6E6258 (휴지통과 동일 톤)</text>

  <!-- disabled -->
  <rect x="1000" y="238" width="80" height="80" rx="18" fill="#FFFFFF" stroke="#F1E9E0" stroke-width="1.5"/>
  <g transform="translate(1040,278)" fill="none" stroke="#D9CFC4" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M -11,-2 A 13,13 0 1 1 -8,11"/>
    <polyline points="-17,-8 -11,-2 -5,-8"/>
  </g>
  <text x="1040" y="336" text-anchor="middle" font-size="10" fill="#C0AFA0">흐리게(opacity↓), 탭 불가</text>

  <!-- behavior strip -->
  <line x1="798" y1="360" x2="1130" y2="360" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="798" y="384" font-size="12.5" font-weight="700" fill="#3B3A4E">동작 — 마지막 채우기 직전으로 복원</text>

  <!-- mistake: huge background filled -->
  <text x="868" y="410" text-anchor="middle" font-size="10.5" fill="#9A8F86">실수: 배경을 잘못 채움</text>
  <g transform="translate(868,470)">
    <rect x="-46" y="-44" width="92" height="88" rx="8" fill="#5BA3E0"/>
    <rect x="-46" y="-44" width="92" height="88" rx="8" fill="none" stroke="#3B3A4E" stroke-width="2.4"/>
    <circle cx="0" cy="0" r="22" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#3B3A4E" stroke-width="2.4"/>
    <circle cx="0" cy="-30" r="5" fill="#3B3A4E" opacity="0.5"/>
  </g>

  <!-- undo arrow -->
  <g transform="translate(980,470)">
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#6E6258" stroke-width="3" stroke-linecap="round"/>
    <polyline points="-11,-7 -20,0 -11,7" fill="none" stroke="#6E6258" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="-14" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6E6258">Undo</text>
  </g>

  <!-- restored -->
  <text x="1062" y="410" text-anchor="middle" font-size="10.5" fill="#9A8F86">복원: 채우기 직전 상태</text>
  <g transform="translate(1062,470)">
    <rect x="-46" y="-44" width="92" height="88" rx="8" fill="#FFFFFF"/>
    <rect x="-46" y="-44" width="92" height="88" rx="8" fill="none" stroke="#3B3A4E" stroke-width="2.4"/>
    <circle cx="0" cy="0" r="22" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#3B3A4E" stroke-width="2.4"/>
  </g>

  <!-- scope notes -->
  <line x1="798" y1="540" x2="1130" y2="540" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="798" y="564" font-size="12.5" font-weight="700" fill="#3B3A4E">범위 / 규칙</text>
  <text x="812" y="588" font-size="11" fill="#3B3A4E">• 1단계만 — 가장 최근 채우기 1회 (다단계 히스토리 아님)</text>
  <text x="812" y="610" font-size="11" fill="#3B3A4E">• 페인트통 채우기에만 적용 — 브러쉬·색연필·지우개·</text>
  <text x="824" y="626" font-size="11" fill="#9A8F86">초기화가 새로 일어나면 보관 중 Undo는 만료(비활성)</text>
  <text x="812" y="648" font-size="11" fill="#3B3A4E">• 즉 "마지막 동작이 채우기일 때만" 버튼 활성</text>
  <text x="812" y="670" font-size="11" fill="#3B3A4E">• 접근성: accessibilityLabel "채우기 되돌리기",</text>
  <text x="824" y="686" font-size="11" fill="#9A8F86">비활성 시 .disabled → VoiceOver "흐림/사용 불가"</text>
  <text x="812" y="708" font-size="11" fill="#3B3A4E">• 아이콘: arrow.uturn.backward</text>

  <text x="798" y="730" font-size="10" fill="#C0AFA0">고려한 대안: 레일 하단 '초기화 옆 위성 원' — 세로 공간·비활성 시 큰 원이 튀어 미채택.</text>
</svg>
