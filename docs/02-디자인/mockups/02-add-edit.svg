<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
    <filter id="sh2" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#C9A88C" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1180" height="820" fill="url(#bg2)"/>

  <!-- scattered profiles to the edges (A2 end-state) -->
  <g opacity="0.55">
    <circle cx="20" cy="300" r="60" fill="#FFE4DB" stroke="#FF7A59" stroke-width="7"/>
    <circle cx="-30" cy="470" r="60" fill="#ECE6FF" stroke="#8A6CFF" stroke-width="7"/>
    <circle cx="1160" cy="300" r="60" fill="#FFF1CC" stroke="#FFC740" stroke-width="7"/>
    <circle cx="1210" cy="470" r="60" fill="#FFE1EF" stroke="#FF6FAF" stroke-width="7"/>
  </g>
  <!-- scatter arrows -->
  <path d="M 250 250 L 120 250" stroke="#B6A89B" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/>
  <path d="M 930 250 L 1060 250" stroke="#B6A89B" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L6,5 L0,10 z" fill="#B6A89B"/></marker></defs>
  <text x="120" y="225" font-size="16" fill="#B6A89B" text-anchor="middle">흩어짐</text>
  <text x="1060" y="225" font-size="16" fill="#B6A89B" text-anchor="middle">흩어짐</text>

  <!-- center card -->
  <g filter="url(#sh2)">
    <rect x="340" y="170" width="500" height="480" rx="36" fill="#FFFFFF"/>
  </g>
  <text x="590" y="240" font-size="34" font-weight="800" fill="#3B3A4E" text-anchor="middle">새 친구 추가</text>

  <!-- image picker -->
  <circle cx="590" cy="350" r="78" fill="#FAF3EC" stroke="#D8C9BA" stroke-width="3" stroke-dasharray="8 8"/>
  <!-- gallery icon -->
  <rect x="556" y="326" width="68" height="50" rx="8" fill="none" stroke="#FF7A59" stroke-width="4"/>
  <circle cx="575" cy="344" r="6" fill="#FF7A59"/>
  <path d="M 560 372 L 582 352 L 596 366 L 606 358 L 620 372 Z" fill="#FF7A59"/>
  <text x="590" y="458" font-size="20" font-weight="600" fill="#FF7A59" text-anchor="middle">＋ 갤러리에서 사진 선택</text>

  <!-- name field -->
  <rect x="410" y="488" width="360" height="58" rx="18" fill="#FAF3EC" stroke="#EBDFD2" stroke-width="2"/>
  <text x="434" y="525" font-size="22" fill="#B6A89B">이름을 입력하세요</text>

  <!-- buttons -->
  <rect x="410" y="572" width="170" height="56" rx="18" fill="#FFFFFF" stroke="#FF7A59" stroke-width="2.5"/>
  <text x="495" y="608" font-size="22" font-weight="700" fill="#FF7A59" text-anchor="middle">취소</text>
  <rect x="600" y="572" width="170" height="56" rx="18" fill="#FF7A59"/>
  <text x="685" y="608" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">저장</text>

  <!-- first-run note -->
  <text x="590" y="720" font-size="19" fill="#9A8F86" text-anchor="middle">✱ 등록된 사용자가 없는 첫 실행에서는 이 화면이 곧바로 나타납니다</text>
  <text x="590" y="752" font-size="17" fill="#B6A89B" text-anchor="middle">수정도 같은 화면을 재사용 (기존 이름·사진이 채워진 상태)</text>
</svg>
