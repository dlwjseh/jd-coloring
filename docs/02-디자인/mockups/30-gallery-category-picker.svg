<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
    <filter id="shSheet" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#4A3B2E" flood-opacity="0.28"/>
    </filter>
    <filter id="shDrop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#4A3B2E" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1180" height="820" fill="url(#bg)"/>
  <rect width="1180" height="820" fill="#3B3A4E" opacity="0.40"/>

  <!-- =================== FRAME A: upload sheet (collapsed) =================== -->
  <text x="305" y="92" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">① 도안 업로드 시트 — '앨범' 선택 줄 추가</text>
  <g filter="url(#shSheet)"><rect x="70" y="120" width="470" height="600" rx="36" fill="#FFFFFF"/></g>
  <text x="305" y="186" font-size="26" font-weight="800" fill="#3B3A4E" text-anchor="middle">도안 만들기</text>
  <text x="305" y="214" font-size="15" fill="#9A8F86" text-anchor="middle">사진을 골라 색칠 도안으로 추가해요</text>

  <!-- photo preview -->
  <rect x="120" y="238" width="370" height="180" rx="20" fill="#FBF4EC" stroke="#EBDFD2" stroke-width="1.5"/>
  <g transform="translate(305,328)" fill="none" stroke="#3B3A4E" stroke-width="5" stroke-linejoin="round">
    <circle cx="0" cy="0" r="44"/>
    <path d="M -30 -30 L -42 -52 L -18 -40 M 30 -30 L 42 -52 L 18 -40"/>
    <circle cx="-16" cy="-4" r="4" fill="#3B3A4E"/><circle cx="16" cy="-4" r="4" fill="#3B3A4E"/>
    <path d="M -6 14 Q 0 20 6 14" stroke-width="4"/>
  </g>
  <text x="305" y="444" font-size="16" font-weight="700" fill="#FF7A59" text-anchor="middle">사진 다시 선택</text>

  <!-- name field -->
  <rect x="120" y="462" width="370" height="46" rx="12" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="140" y="491" font-size="16" fill="#B9ACA0">도안 이름 (선택)</text>

  <!-- NEW: category selector row -->
  <text x="120" y="552" font-size="16" font-weight="700" fill="#3B3A4E">앨범</text>
  <rect x="186" y="528" width="304" height="46" rx="12" fill="#FFF6F2" stroke="#FF7A59" stroke-width="1.5"/>
  <g transform="translate(214,551)"><circle cx="0" cy="-7" r="10" fill="#FFD2A6" stroke="#3B3A4E" stroke-width="2.5"/></g>
  <text x="236" y="557" font-size="17" font-weight="600" fill="#3B3A4E">동물</text>
  <path d="M 462 546 L 470 555 L 478 546" fill="none" stroke="#9A8F86" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="120" y="600" font-size="13" fill="#B6A89B">기본값 = 지금 들어와 있는 앨범 · 탭하면 변경 ▸</text>

  <!-- buttons -->
  <rect x="120" y="628" width="175" height="54" rx="14" fill="#FFFFFF" stroke="#C9BCAE" stroke-width="2"/>
  <text x="207" y="662" font-size="19" font-weight="600" fill="#7A6E64" text-anchor="middle">취소</text>
  <rect x="315" y="628" width="175" height="54" rx="14" fill="#FF7A59"/>
  <text x="402" y="662" font-size="19" font-weight="700" fill="#FFFFFF" text-anchor="middle">도안 저장</text>

  <!-- =================== FRAME B: picker dropdown open =================== -->
  <text x="875" y="92" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">② '앨범' 탭 → 앨범 고르기 펼침</text>
  <g filter="url(#shSheet)"><rect x="640" y="120" width="470" height="600" rx="36" fill="#FFFFFF"/></g>
  <text x="875" y="186" font-size="26" font-weight="800" fill="#3B3A4E" text-anchor="middle">도안 만들기</text>
  <text x="875" y="214" font-size="15" fill="#9A8F86" text-anchor="middle">사진을 골라 색칠 도안으로 추가해요</text>
  <rect x="690" y="238" width="370" height="180" rx="20" fill="#FBF4EC" stroke="#EBDFD2" stroke-width="1.5"/>
  <g transform="translate(875,328)" fill="none" stroke="#3B3A4E" stroke-width="5" stroke-linejoin="round">
    <circle cx="0" cy="0" r="44"/>
    <path d="M -30 -30 L -42 -52 L -18 -40 M 30 -30 L 42 -52 L 18 -40"/>
    <circle cx="-16" cy="-4" r="4" fill="#3B3A4E"/><circle cx="16" cy="-4" r="4" fill="#3B3A4E"/>
    <path d="M -6 14 Q 0 20 6 14" stroke-width="4"/>
  </g>
  <text x="875" y="444" font-size="16" font-weight="700" fill="#FF7A59" text-anchor="middle">사진 다시 선택</text>
  <rect x="690" y="462" width="370" height="46" rx="12" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="710" y="491" font-size="16" fill="#B9ACA0">도안 이름 (선택)</text>

  <!-- selector (open, highlighted) -->
  <text x="690" y="552" font-size="16" font-weight="700" fill="#3B3A4E">앨범</text>
  <rect x="756" y="528" width="304" height="46" rx="12" fill="#FFFFFF" stroke="#FF7A59" stroke-width="2.5"/>
  <text x="784" y="557" font-size="17" font-weight="600" fill="#3B3A4E">동물</text>
  <path d="M 1032 551 L 1040 542 L 1048 551" fill="none" stroke="#FF7A59" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- dropdown list -->
  <g filter="url(#shDrop)"><rect x="756" y="582" width="304" height="232" rx="16" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="1.5"/></g>
  <!-- 동물 (selected) -->
  <rect x="764" y="588" width="288" height="42" rx="10" fill="#FFF1EC"/>
  <text x="784" y="616" font-size="17" font-weight="700" fill="#FF7A59">동물</text>
  <path d="M 1018 609 L 1027 618 L 1042 600" fill="none" stroke="#FF7A59" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 꽃 -->
  <text x="784" y="660" font-size="17" font-weight="500" fill="#3B3A4E">꽃</text>
  <!-- 탈것 -->
  <text x="784" y="702" font-size="17" font-weight="500" fill="#3B3A4E">탈것</text>
  <!-- 미분류 -->
  <text x="784" y="744" font-size="17" font-weight="500" fill="#9A8F86">미분류</text>
  <line x1="772" y1="764" x2="1044" y2="764" stroke="#EBDFD2" stroke-width="1.5"/>
  <!-- + 새 앨범 -->
  <text x="784" y="792" font-size="17" font-weight="700" fill="#FF7A59">＋ 새 앨범 만들기</text>
</svg>
