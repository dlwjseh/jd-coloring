<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <rect width="1180" height="500" fill="#FFFDFB"/>
  <text x="40" y="56" font-size="26" font-weight="800" fill="#3B3A4E">A1 · 화면 진입 — 오른쪽에서 순차(stagger) 등장</text>
  <text x="40" y="86" font-size="17" fill="#9A8F86">이 화면에 올 때마다 재생 · 각 프로필이 50~80ms 시차로 “주르르르” 슬라이드 인</text>

  <!-- frame 1 -->
  <rect x="40" y="120" width="340" height="300" rx="24" fill="#FFF4EC"/>
  <text x="60" y="156" font-size="20" font-weight="700" fill="#7A6E64">1</text>
  <circle cx="120" cy="275" r="38" fill="#FFE4DB" stroke="#FF7A59" stroke-width="6"/>
  <!-- one entering from right with motion lines -->
  <circle cx="320" cy="275" r="38" fill="#ECE6FF" stroke="#8A6CFF" stroke-width="6" opacity="0.85"/>
  <line x1="360" y1="262" x2="395" y2="262" stroke="#8A6CFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="360" y1="288" x2="388" y2="288" stroke="#8A6CFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- frame 2 -->
  <rect x="420" y="120" width="340" height="300" rx="24" fill="#FFF4EC"/>
  <text x="440" y="156" font-size="20" font-weight="700" fill="#7A6E64">2</text>
  <circle cx="500" cy="275" r="38" fill="#FFE4DB" stroke="#FF7A59" stroke-width="6"/>
  <circle cx="600" cy="275" r="38" fill="#ECE6FF" stroke="#8A6CFF" stroke-width="6"/>
  <circle cx="715" cy="275" r="38" fill="#DBF6F5" stroke="#36C5C0" stroke-width="6" opacity="0.85"/>
  <line x1="755" y1="262" x2="785" y2="262" stroke="#36C5C0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="755" y1="288" x2="778" y2="288" stroke="#36C5C0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- frame 3 -->
  <rect x="800" y="120" width="340" height="300" rx="24" fill="#FFF4EC"/>
  <text x="820" y="156" font-size="20" font-weight="700" fill="#7A6E64">3</text>
  <circle cx="868" cy="275" r="38" fill="#FFE4DB" stroke="#FF7A59" stroke-width="6"/>
  <circle cx="958" cy="275" r="38" fill="#ECE6FF" stroke="#8A6CFF" stroke-width="6"/>
  <circle cx="1048" cy="275" r="38" fill="#DBF6F5" stroke="#36C5C0" stroke-width="6"/>
  <circle cx="1130" cy="275" r="38" fill="#FFF1CC" stroke="#FFC740" stroke-width="6"/>
  <text x="970" y="395" font-size="16" fill="#9A8F86" text-anchor="middle">정렬 완료 (살짝 스프링)</text>

  <!-- arrows between frames -->
  <path d="M 384 270 L 414 270" stroke="#C9BCAE" stroke-width="4" stroke-linecap="round"/>
  <path d="M 764 270 L 794 270" stroke="#C9BCAE" stroke-width="4" stroke-linecap="round"/>
  <text x="1130" y="468" font-size="40" fill="#FF7A59" text-anchor="middle" opacity="0.5">⟵</text>
  <text x="600" y="468" font-size="16" fill="#B6A89B" text-anchor="middle">이동 방향: 오른쪽 → 왼쪽</text>
</svg>
