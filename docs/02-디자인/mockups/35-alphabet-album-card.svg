<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" font-family="'SF Pro Rounded','Apple SD Gothic Neo','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#C9A88C" flood-opacity="0.35"/>
    </filter>
    <filter id="shBig" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#C9A88C" flood-opacity="0.34"/>
    </filter>
    <filter id="shCard" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#C9A88C" flood-opacity="0.28"/>
    </filter>
    <g id="face2">
      <circle cx="-9" cy="-5" r="3.2" fill="#3B3A4E"/>
      <circle cx="9" cy="-5" r="3.2" fill="#3B3A4E"/>
      <path d="M -11 6 Q 0 16 11 6" fill="none" stroke="#3B3A4E" stroke-width="2.6" stroke-linecap="round"/>
    </g>
    <clipPath id="screen"><rect width="1180" height="820"/></clipPath>
  </defs>

  <g clip-path="url(#screen)">
  <rect width="1180" height="820" fill="url(#bg)"/>
  <!-- decorative blobs (BubbleBackground) -->
  <circle cx="70" cy="160" r="120" fill="#8A6CFF" opacity="0.10"/>
  <circle cx="1120" cy="130" r="140" fill="#36C5C0" opacity="0.10"/>
  <circle cx="120" cy="730" r="90" fill="#5FD08A" opacity="0.11"/>
  <circle cx="1080" cy="770" r="80" fill="#FFC740" opacity="0.10"/>

  <!-- ===== top bar ===== -->
  <g filter="url(#shCard)">
    <circle cx="74" cy="74" r="30" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/>
    <path d="M 84 60 L 66 74 L 84 88" fill="none" stroke="#3B3A4E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="590" y="60" font-size="38" font-weight="800" fill="#3B3A4E" text-anchor="middle">어떤 앨범을 열어볼까요?</text>
  <text x="590" y="94" font-size="20" fill="#9A8F86" text-anchor="middle">주언이의 색칠 앨범 · 7개</text>
  <g>
    <text x="1048" y="82" font-size="24" font-weight="700" fill="#3B3A4E" text-anchor="end">주언이</text>
    <circle cx="1090" cy="74" r="28" fill="#FFE4DB" stroke="#FF7A59" stroke-width="5" filter="url(#shCard)"/>
    <use href="#face2" transform="translate(1090,74)"/>
  </g>

  <!-- =================================================================== -->
  <!-- LEFT PEEK (prev = '한글', the other system album · soft-blue cover)    -->
  <!-- =================================================================== -->
  <g opacity="0.5">
    <g filter="url(#shCard)"><rect x="-251" y="172" width="401" height="476" rx="41" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
    <rect x="-227" y="196" width="353" height="312" rx="32" fill="#E9EEFF"/>
    <g font-weight="900" text-anchor="middle" stroke="#3B3A4E" stroke-width="6" stroke-linejoin="round" paint-order="stroke" font-size="120">
      <text x="-110" y="392" fill="#FFFFFF">ㄱ</text>
      <text x="10" y="392" fill="#FFD7E9">ㅏ</text>
    </g>
    <text x="-50" y="572" font-size="40" font-weight="800" fill="#3B3A4E" text-anchor="middle">한글</text>
    <text x="-50" y="616" font-size="22" fill="#9A8F86" text-anchor="middle">24개 도안</text>
  </g>

  <!-- =================================================================== -->
  <!-- RIGHT PEEK (next = first user album '동물')                           -->
  <!-- =================================================================== -->
  <g opacity="0.5">
    <g filter="url(#shCard)"><rect x="1030" y="172" width="401" height="476" rx="41" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
    <rect x="1054" y="196" width="353" height="312" rx="32" fill="#FFE9CF"/>
    <g transform="translate(1230,348)">
      <circle cx="-56" cy="-58" r="28" fill="#FFD2A6" stroke="#3B3A4E" stroke-width="7"/>
      <circle cx="56" cy="-58" r="28" fill="#FFD2A6" stroke="#3B3A4E" stroke-width="7"/>
      <circle cx="0" cy="0" r="80" fill="#FFD2A6" stroke="#3B3A4E" stroke-width="7"/>
    </g>
    <text x="1230" y="572" font-size="40" font-weight="800" fill="#3B3A4E" text-anchor="middle">동물</text>
    <text x="1230" y="616" font-size="22" fill="#9A8F86" text-anchor="middle">12개 도안</text>
  </g>

  <!-- =================================================================== -->
  <!-- CENTER CARD = '알파벳' (DEFAULT, pinned 2nd after 한글, protected)     -->
  <!-- x=354 y=130 w=472 h=560 rx48  (가운데 x=590)                         -->
  <!-- =================================================================== -->
  <g filter="url(#shBig)"><rect x="354" y="130" width="472" height="560" rx="48" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>

  <!-- cover: soft-mint tone (distinct from 한글 soft-blue), contact-sheet of outline letters -->
  <rect x="378" y="156" width="424" height="384" rx="38" fill="#E6F5EC"/>
  <!-- mini grid of letter outlines (white fill + dark stroke = coloring template look) -->
  <g font-weight="900" text-anchor="middle" stroke="#3B3A4E" stroke-width="3" stroke-linejoin="round" paint-order="stroke">
    <!-- row 1 대문자 -->
    <text x="470" y="312" font-size="104" fill="#FFFFFF">A</text>
    <text x="590" y="312" font-size="104" fill="#FFD7E9">B</text><!-- lightly colored -->
    <text x="710" y="312" font-size="104" fill="#FFFFFF">C</text>
    <!-- row 2 소문자 -->
    <text x="470" y="468" font-size="104" fill="#FFE9A8">a</text><!-- lightly colored -->
    <text x="590" y="468" font-size="104" fill="#FFFFFF">b</text>
    <text x="710" y="468" font-size="104" fill="#CDEBD6">c</text><!-- lightly colored -->
  </g>

  <!-- '기본 제공' badge (top-left of cover) -->
  <g filter="url(#shCard)">
    <rect x="396" y="176" width="150" height="44" rx="22" fill="#FF7A59"/>
  </g>
  <text x="471" y="205" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">★ 기본 제공</text>

  <!-- name + count -->
  <text x="590" y="608" font-size="42" font-weight="800" fill="#3B3A4E" text-anchor="middle">알파벳</text>
  <text x="590" y="652" font-size="23" fill="#9A8F86" text-anchor="middle">52개 도안 · 대문자 26 · 소문자 26</text>

  <!-- ===== swipe chevrons (faded) ===== -->
  <path d="M 332 388 L 308 412 L 332 436" fill="none" stroke="#3B3A4E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.20"/>
  <path d="M 848 388 L 872 412 L 848 436" fill="none" stroke="#3B3A4E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.20"/>

  <!-- ===== page dots — 알파벳 = 2nd (coral pill); 한글 = 1st (gray) ===== -->
  <g>
    <circle cx="512" cy="725" r="6" fill="#D8C9BA"/><!-- 한글 (first) -->
    <rect x="532" y="719" width="28" height="12" rx="6" fill="#FF7A59"/><!-- 알파벳 (current, 2nd) -->
    <circle cx="580" cy="725" r="6" fill="#D8C9BA"/>
    <circle cx="602" cy="725" r="6" fill="#D8C9BA"/>
    <circle cx="624" cy="725" r="6" fill="#D8C9BA"/>
    <circle cx="648" cy="725" r="6" fill="#B6A89B"/><!-- last = 미분류, muted -->
  </g>
  <text x="590" y="764" font-size="17" font-weight="600" fill="#B6A89B" text-anchor="middle">기본 제공 앨범 — 한글 다음(2번째)에 고정 · 롱프레스 메뉴 없음(삭제·이름변경 불가)</text>

  <!-- ===== add button (앨범 추가 — 여전히 가능: 다른 앨범 생성) ===== -->
  <g filter="url(#sh)">
    <circle cx="1085" cy="704" r="44" fill="#FF7A59"/>
    <path d="M 1085 684 L 1085 724 M 1065 704 L 1105 704" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="1085" y="772" font-size="17" font-weight="600" fill="#7A6E64" text-anchor="middle">앨범 추가</text>

  <!-- ===== protected callout (left-bottom) — 보호 동작 설명 ===== -->
  <g filter="url(#shCard)"><rect x="40" y="690" width="300" height="96" rx="20" fill="#FFFFFF" stroke="#EBDFD2" stroke-width="2"/></g>
  <text x="64" y="722" font-size="17" font-weight="800" fill="#3B3A4E">🔒 알파벳 = 시스템 앨범</text>
  <text x="64" y="748" font-size="14" fill="#9A8F86">한글과 같은 보호 앨범 — [이름수정]·[대표이미지]·</text>
  <text x="64" y="768" font-size="14" fill="#9A8F86">[삭제] 메뉴가 뜨지 않아요. (일반 앨범엔 그대로 노출)</text>
  </g>
</svg>
