<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 530" font-family="'SF Pro Rounded',-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#3B3A4E" flood-opacity="0.09"/>
    </filter>
    <filter id="sh-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3B3A4E" flood-opacity="0.11"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="530" fill="#F5F0EC"/>

  <!-- Global title -->
  <text x="440" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#9A8F86">iPhone 타이머 설정 — 선택 상태 표시 (§23-6 · 2026-06-04)</text>

  <!-- ═══════════════════════════════════════════════════
       FRAME A : 프리셋 선택됨 (10분 탭)
       10분 카드 → 코랄 채움 / 텍스트 필드 자동 반영
  ════════════════════════════════════════════════════ -->
  <rect x="24" y="44" width="390" height="455" rx="24" fill="#FFFDF9" stroke="#EBDFD2" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Frame A label -->
  <text x="219" y="69" text-anchor="middle" font-size="12" font-weight="700" fill="#FF7A59">A. 프리셋 선택됨</text>
  <text x="219" y="85" text-anchor="middle" font-size="10" fill="#B6A89B">"10분" 탭 → 카드 코랄 채움 + 텍스트 필드 자동 "10"</text>

  <!-- Screen title -->
  <text x="219" y="118" text-anchor="middle" font-size="19" font-weight="800" fill="#3B3A4E">색칠 타이머</text>
  <text x="219" y="136" text-anchor="middle" font-size="11" fill="#9A8F86">아이의 색칠 시간을 설정하세요</text>

  <!-- 10분 – SELECTED: coral fill, white text -->
  <rect x="56" y="153" width="148" height="72" rx="18" fill="#FF7A59" filter="url(#sh-sm)"/>
  <text x="130" y="186" text-anchor="middle" font-size="26" font-weight="700" fill="white">10</text>
  <text x="130" y="209" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.82)">분</text>

  <!-- 15분 – unselected -->
  <rect x="234" y="153" width="148" height="72" rx="18" fill="white" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="308" y="186" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59">15</text>
  <text x="308" y="209" text-anchor="middle" font-size="11" fill="#9A8F86">분</text>

  <!-- 20분 – unselected -->
  <rect x="56" y="241" width="148" height="72" rx="18" fill="white" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="130" y="274" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59">20</text>
  <text x="130" y="297" text-anchor="middle" font-size="11" fill="#9A8F86">분</text>

  <!-- 30분 – unselected -->
  <rect x="234" y="241" width="148" height="72" rx="18" fill="white" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="308" y="274" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59">30</text>
  <text x="308" y="297" text-anchor="middle" font-size="11" fill="#9A8F86">분</text>

  <!-- Arrow annotation -->
  <text x="219" y="327" text-anchor="middle" font-size="10" fill="#C4B8AE">↓ 프리셋 탭 시 아래 필드에 자동 반영</text>

  <!-- Text field: auto-filled "10", default gray border (not focused) -->
  <rect x="56" y="337" width="326" height="52" rx="14" fill="white" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="219" y="369" text-anchor="middle" font-size="22" font-weight="600" fill="#3B3A4E">10</text>
  <text x="356" y="369" text-anchor="end" font-size="15" font-weight="500" fill="#9A8F86">분</text>

  <!-- Start button -->
  <rect x="56" y="407" width="326" height="52" rx="16" fill="#FF7A59" filter="url(#sh-sm)"/>
  <text x="219" y="438" text-anchor="middle" font-size="18" font-weight="700" fill="white">시작</text>


  <!-- ═══════════════════════════════════════════════════
       FRAME B : 직접 입력 (25분 타이핑)
       프리셋과 불일치 → 카드 모두 비강조 / 필드 포커스
  ════════════════════════════════════════════════════ -->
  <rect x="466" y="44" width="390" height="455" rx="24" fill="#FFFDF9" stroke="#EBDFD2" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Frame B label -->
  <text x="661" y="69" text-anchor="middle" font-size="12" font-weight="700" fill="#9A8F86">B. 직접 입력 (25분)</text>
  <text x="661" y="85" text-anchor="middle" font-size="10" fill="#B6A89B">"25" 타이핑 → 프리셋 없음, 모든 카드 비강조</text>

  <!-- Screen title -->
  <text x="661" y="118" text-anchor="middle" font-size="19" font-weight="800" fill="#3B3A4E">색칠 타이머</text>
  <text x="661" y="136" text-anchor="middle" font-size="11" fill="#9A8F86">아이의 색칠 시간을 설정하세요</text>

  <!-- 10분 – unselected -->
  <rect x="498" y="153" width="148" height="72" rx="18" fill="white" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="572" y="186" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59">10</text>
  <text x="572" y="209" text-anchor="middle" font-size="11" fill="#9A8F86">분</text>

  <!-- 15분 – unselected -->
  <rect x="676" y="153" width="148" height="72" rx="18" fill="white" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="750" y="186" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59">15</text>
  <text x="750" y="209" text-anchor="middle" font-size="11" fill="#9A8F86">분</text>

  <!-- 20분 – unselected -->
  <rect x="498" y="241" width="148" height="72" rx="18" fill="white" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="572" y="274" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59">20</text>
  <text x="572" y="297" text-anchor="middle" font-size="11" fill="#9A8F86">분</text>

  <!-- 30분 – unselected -->
  <rect x="676" y="241" width="148" height="72" rx="18" fill="white" stroke="#EBDFD2" stroke-width="1.5"/>
  <text x="750" y="274" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59">30</text>
  <text x="750" y="297" text-anchor="middle" font-size="11" fill="#9A8F86">분</text>

  <!-- Annotation -->
  <text x="661" y="327" text-anchor="middle" font-size="10" fill="#C4B8AE">"25"는 프리셋 없음 → 버튼 모두 기본 상태 유지</text>

  <!-- Text field: focused, coral border, value "25" + cursor -->
  <rect x="498" y="337" width="326" height="52" rx="14" fill="white" stroke="#FF7A59" stroke-width="2"/>
  <text x="661" y="369" text-anchor="middle" font-size="22" font-weight="600" fill="#3B3A4E">25</text>
  <!-- Cursor: "25" at font-size 22 ≈ 27px wide, right edge ≈ 661+14 = 675 -->
  <rect x="675" y="347" width="2.5" height="22" rx="1.25" fill="#FF7A59"/>
  <text x="798" y="369" text-anchor="end" font-size="15" font-weight="500" fill="#9A8F86">분</text>

  <!-- Start button -->
  <rect x="498" y="407" width="326" height="52" rx="16" fill="#FF7A59" filter="url(#sh-sm)"/>
  <text x="661" y="438" text-anchor="middle" font-size="18" font-weight="700" fill="white">시작</text>


  <!-- ═══════ LEGEND ═══════ -->
  <rect x="24" y="506" width="832" height="20" rx="10" fill="rgba(235,223,210,0.55)"/>
  <text x="440" y="520" text-anchor="middle" font-size="11" fill="#9A8F86" font-weight="500">
    텍스트 필드 = 단일 진실 공급원 · 프리셋 탭 → 필드 자동 반영 · 직접 입력 시 일치하는 프리셋 자동 강조
  </text>
</svg>
