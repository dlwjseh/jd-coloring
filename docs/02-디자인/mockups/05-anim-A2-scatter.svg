<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500" font-family="'SF Pro Rounded','Helvetica Neue',sans-serif">
  <rect width="1180" height="500" fill="#FFFDFB"/>
  <text x="40" y="56" font-size="26" font-weight="800" fill="#3B3A4E">A2 · 등록·수정 진입 — 흩어짐 + 폼 등장</text>
  <text x="40" y="86" font-size="17" fill="#9A8F86">프로필이 좌·우로 갈라져 가운데를 비우고 → 폼이 아래에서 스윽 (나갈 땐 역재생)</text>

  <!-- frame 1 -->
  <rect x="40" y="120" width="340" height="300" rx="24" fill="#FFF4EC"/>
  <text x="60" y="156" font-size="20" font-weight="700" fill="#7A6E64">1</text>
  <circle cx="130" cy="275" r="34" fill="#FFE4DB" stroke="#FF7A59" stroke-width="5"/>
  <circle cx="210" cy="275" r="34" fill="#ECE6FF" stroke="#8A6CFF" stroke-width="5"/>
  <circle cx="290" cy="275" r="34" fill="#DBF6F5" stroke="#36C5C0" stroke-width="5"/>
  <text x="210" y="395" font-size="15" fill="#9A8F86" text-anchor="middle">선택 화면</text>

  <!-- frame 2 : splitting -->
  <rect x="420" y="120" width="340" height="300" rx="24" fill="#FFF4EC"/>
  <text x="440" y="156" font-size="20" font-weight="700" fill="#7A6E64">2</text>
  <circle cx="455" cy="275" r="34" fill="#FFE4DB" stroke="#FF7A59" stroke-width="5"/>
  <circle cx="510" cy="275" r="30" fill="#ECE6FF" stroke="#8A6CFF" stroke-width="5" opacity="0.7"/>
  <path d="M 540 230 L 470 230" stroke="#B6A89B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="725" cy="275" r="34" fill="#FFF1CC" stroke="#FFC740" stroke-width="5"/>
  <circle cx="670" cy="275" r="30" fill="#DBF6F5" stroke="#36C5C0" stroke-width="5" opacity="0.7"/>
  <path d="M 640 230 L 710 230" stroke="#B6A89B" stroke-width="3" stroke-linecap="round"/>
  <text x="590" y="395" font-size="15" fill="#9A8F86" text-anchor="middle">좌·우로 흩어짐</text>

  <!-- frame 3 : form slides up -->
  <rect x="800" y="120" width="340" height="300" rx="24" fill="#FFF4EC"/>
  <text x="820" y="156" font-size="20" font-weight="700" fill="#7A6E64">3</text>
  <!-- faded scattered at edges -->
  <circle cx="815" cy="200" r="24" fill="#FFE4DB" stroke="#FF7A59" stroke-width="4" opacity="0.4"/>
  <circle cx="1125" cy="200" r="24" fill="#FFF1CC" stroke="#FFC740" stroke-width="4" opacity="0.4"/>
  <!-- form card rising -->
  <rect x="888" y="210" width="164" height="170" rx="18" fill="#FFFFFF" stroke="#EBDFD2"/>
  <circle cx="970" cy="248" r="22" fill="#FAF3EC" stroke="#D8C9BA" stroke-width="2" stroke-dasharray="5 5"/>
  <rect x="912" y="288" width="116" height="26" rx="9" fill="#FAF3EC" stroke="#EBDFD2"/>
  <rect x="912" y="326" width="54" height="26" rx="9" fill="#FFFFFF" stroke="#FF7A59"/>
  <rect x="974" y="326" width="54" height="26" rx="9" fill="#FF7A59"/>
  <!-- up arrow -->
  <path d="M 970 410 L 970 392 M 962 400 L 970 392 L 978 400" stroke="#FF7A59" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="970" y="400" font-size="0"> </text>

  <!-- arrows between frames -->
  <path d="M 384 270 L 414 270" stroke="#C9BCAE" stroke-width="4" stroke-linecap="round"/>
  <path d="M 764 270 L 794 270" stroke="#C9BCAE" stroke-width="4" stroke-linecap="round"/>
</svg>
