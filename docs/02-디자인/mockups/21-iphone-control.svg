<svg xmlns="http://www.w3.org/2000/svg" width="840" height="800" viewBox="0 0 840 800">
  <defs>
    <linearGradient id="bg21" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF4EC"/>
    </linearGradient>
    <filter id="sh21" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#3B3A4E" flood-opacity="0.14"/>
    </filter>
    <filter id="sm21" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#3B3A4E" flood-opacity="0.09"/>
    </filter>
    <!-- Screen clip paths -->
    <clipPath id="clip1">
      <rect x="32" y="32" width="336" height="696" rx="40"/>
    </clipPath>
    <clipPath id="clip2">
      <rect x="472" y="32" width="336" height="696" rx="40"/>
    </clipPath>
  </defs>

  <!-- SVG Background -->
  <rect width="840" height="800" fill="url(#bg21)"/>
  <circle cx="420" cy="760" r="110" fill="#36C5C0" opacity="0.05"/>
  <circle cx="60" cy="420" r="75" fill="#FF7A59" opacity="0.06"/>
  <circle cx="790" cy="180" r="65" fill="#8A6CFF" opacity="0.06"/>

  <!-- Phone state labels (above) -->
  <text x="200" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#9A8F86" font-family="-apple-system,sans-serif">대기 — 타이머 설정</text>
  <text x="640" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#9A8F86" font-family="-apple-system,sans-serif">타이머 진행 중 — 5분 전 경고</text>

  <!-- ════════════════════════════════════ -->
  <!-- PHONE 1  (Left · Ready state)        -->
  <!-- ════════════════════════════════════ -->
  <rect x="20" y="30" width="360" height="720" rx="48" fill="#1C1C1E" filter="url(#sh21)"/>
  <rect x="32" y="32" width="336" height="696" rx="40" fill="url(#screenGrad)"/>
  <!-- Dynamic Island pill -->
  <rect x="140" y="32" width="120" height="32" rx="16" fill="#1C1C1E"/>

  <g clip-path="url(#clip1)">
    <!-- Screen bubbles -->
    <circle cx="340" cy="660" r="80" fill="#FFC740" opacity="0.07"/>
    <circle cx="40" cy="490" r="60" fill="#FF6FAF" opacity="0.06"/>

    <!-- Connection status bar -->
    <rect x="32" y="80" width="336" height="50" fill="white" opacity="0.55"/>
    <circle cx="60" cy="105" r="6" fill="#5FD08A"/>
    <text x="75" y="110" font-size="14" font-weight="600" fill="#3B3A4E" font-family="-apple-system,sans-serif">Jeondo의 iPad</text>
    <text x="358" y="110" text-anchor="end" font-size="12" font-weight="600" fill="#5FD08A" font-family="-apple-system,sans-serif">연결됨</text>

    <!-- Page title -->
    <text x="200" y="184" text-anchor="middle" font-size="26" font-weight="800" fill="#3B3A4E" font-family="-apple-system,sans-serif">색칠 타이머</text>
    <text x="200" y="208" text-anchor="middle" font-size="13" fill="#9A8F86" font-family="-apple-system,sans-serif">아이의 색칠 시간을 설정하세요</text>

    <!-- Divider -->
    <line x1="52" y1="230" x2="348" y2="230" stroke="#EBDFD2" stroke-width="1"/>

    <!-- Preset label -->
    <text x="200" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#B6A89B" font-family="-apple-system,sans-serif" letter-spacing="0.5">빠른 설정</text>

    <!-- Preset grid 2×2 — 숫자+분 그룹 세로 중앙 정렬 (card h=74, center=card_y+37) -->
    <!-- Row 1 (card_y=266, center=303): 숫자 baseline=307, 분 baseline=322 -->
    <rect x="52" y="266" width="134" height="74" rx="20" fill="white" filter="url(#sm21)"/>
    <text x="119" y="307" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59" font-family="-apple-system,sans-serif">10</text>
    <text x="119" y="322" text-anchor="middle" font-size="12" fill="#9A8F86" font-family="-apple-system,sans-serif">분</text>

    <rect x="214" y="266" width="134" height="74" rx="20" fill="white" filter="url(#sm21)"/>
    <text x="281" y="307" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59" font-family="-apple-system,sans-serif">15</text>
    <text x="281" y="322" text-anchor="middle" font-size="12" fill="#9A8F86" font-family="-apple-system,sans-serif">분</text>

    <!-- Row 2 (card_y=356, center=393): 숫자 baseline=397, 분 baseline=412 -->
    <rect x="52" y="356" width="134" height="74" rx="20" fill="white" filter="url(#sm21)"/>
    <text x="119" y="397" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59" font-family="-apple-system,sans-serif">20</text>
    <text x="119" y="412" text-anchor="middle" font-size="12" fill="#9A8F86" font-family="-apple-system,sans-serif">분</text>

    <rect x="214" y="356" width="134" height="74" rx="20" fill="white" filter="url(#sm21)"/>
    <text x="281" y="397" text-anchor="middle" font-size="26" font-weight="700" fill="#FF7A59" font-family="-apple-system,sans-serif">30</text>
    <text x="281" y="412" text-anchor="middle" font-size="12" fill="#9A8F86" font-family="-apple-system,sans-serif">분</text>

    <!-- Custom input link -->
    <text x="200" y="464" text-anchor="middle" font-size="14" fill="#9A8F86" font-family="-apple-system,sans-serif">직접 입력</text>
    <line x1="162" y1="467" x2="238" y2="467" stroke="#EBDFD2" stroke-width="1"/>

    <!-- Start button -->
    <rect x="52" y="490" width="296" height="56" rx="22" fill="#FF7A59" filter="url(#sm21)"/>
    <text x="200" y="524" text-anchor="middle" font-size="18" font-weight="700" fill="white" font-family="-apple-system,sans-serif">시작</text>
  </g>

  <!-- ════════════════════════════════════ -->
  <!-- PHONE 2  (Right · Timer running)     -->
  <!-- ════════════════════════════════════ -->
  <rect x="460" y="30" width="360" height="720" rx="48" fill="#1C1C1E" filter="url(#sh21)"/>
  <rect x="472" y="32" width="336" height="696" rx="40" fill="url(#screenGrad)"/>
  <!-- Dynamic Island pill -->
  <rect x="580" y="32" width="120" height="32" rx="16" fill="#1C1C1E"/>

  <g clip-path="url(#clip2)">
    <!-- Screen bubbles -->
    <circle cx="770" cy="680" r="75" fill="#FF7A59" opacity="0.08"/>
    <circle cx="480" cy="530" r="60" fill="#FFC740" opacity="0.07"/>

    <!-- Connection status bar -->
    <rect x="472" y="80" width="336" height="50" fill="white" opacity="0.55"/>
    <circle cx="500" cy="105" r="6" fill="#5FD08A"/>
    <text x="515" y="110" font-size="14" font-weight="600" fill="#3B3A4E" font-family="-apple-system,sans-serif">Jeondo의 iPad</text>
    <text x="798" y="110" text-anchor="end" font-size="12" font-weight="600" fill="#5FD08A" font-family="-apple-system,sans-serif">연결됨</text>

    <!-- "남은 시간" label -->
    <text x="640" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#9A8F86" font-family="-apple-system,sans-serif">남은 시간</text>

    <!-- Progress ring (amber, ~25% remaining = 5/20min) -->
    <!-- r=90, circumference ≈ 565.5, 25% ≈ 141 -->
    <!-- Background track -->
    <circle cx="640" cy="308" r="90" fill="none" stroke="#EBDFD2" stroke-width="14"/>
    <!-- Remaining arc: amber, start from 12 o'clock going clockwise -->
    <circle cx="640" cy="308" r="90" fill="none" stroke="#D4720A" stroke-width="14"
            stroke-dasharray="141 424" stroke-linecap="round"
            transform="rotate(-90 640 308)"/>

    <!-- Countdown number inside ring — 그룹 세로 중앙 정렬 (ring cy=308) -->
    <!-- 04:32(42pt)+20분설정(13pt) 그룹 center ≈ 308 -->
    <text x="640" y="318" text-anchor="middle" font-size="42" font-weight="800" fill="#D4720A" font-family="-apple-system,sans-serif">04:32</text>
    <text x="640" y="333" text-anchor="middle" font-size="13" fill="#9A8F86" font-family="-apple-system,sans-serif">20분 설정</text>

    <!-- 5min warning chip (amber) -->
    <rect x="540" y="430" width="200" height="38" rx="19" fill="#FFF3E0"/>
    <text x="640" y="454" text-anchor="middle" font-size="13" font-weight="600" fill="#D4720A" font-family="-apple-system,sans-serif">⚠ 5분이 남았어요</text>

    <!-- Cancel button -->
    <rect x="532" y="490" width="216" height="56" rx="22" fill="white" stroke="#C9BCAE" stroke-width="1.5" filter="url(#sm21)"/>
    <text x="640" y="524" text-anchor="middle" font-size="16" font-weight="600" fill="#7A6E64" font-family="-apple-system,sans-serif">취소</text>

    <!-- Footer info inside screen -->
    <text x="640" y="605" text-anchor="middle" font-size="12" fill="#9A8F86" font-family="-apple-system,sans-serif">만료 시 iPad → 색칠 저장 후 즉시 홈 복귀</text>
    <text x="640" y="624" text-anchor="middle" font-size="12" fill="#9A8F86" font-family="-apple-system,sans-serif">연결 끊겨도 iPad 단독 카운트 유지</text>
  </g>

  <!-- Bottom labels -->
  <text x="200" y="766" text-anchor="middle" font-size="12" fill="#9A8F86" font-family="-apple-system,sans-serif">iPhone 세로 전용 · 연결 없으면 페어링 안내</text>
  <text x="640" y="766" text-anchor="middle" font-size="12" fill="#9A8F86" font-family="-apple-system,sans-serif">1분 전엔 #FF5A5F 빨강으로 전환(칩 디자인 §22 참조)</text>

  <!-- File label -->
  <text x="40" y="789" font-size="11" fill="#B6A89B" font-family="-apple-system,sans-serif">21-iphone-control.svg · iPhone 부모 제어판 — 2가지 상태</text>
</svg>
